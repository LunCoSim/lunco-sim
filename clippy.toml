# ─────────────────────────────────────────────────────────────────────
# LunCoSim — clippy lint configuration
# ─────────────────────────────────────────────────────────────────────
#
# Lives at the workspace root so every member crate inherits it under
# `cargo clippy --workspace`. The lint *severity* is set in `Cargo.toml`
# under `[workspace.lints.clippy]` (currently `disallowed_methods =
# "deny"`); this file only enumerates the banned symbols.
#
# Why a workspace-wide ban list at all? Because every entry below is a
# foot-gun whose failure mode is **wasm-only** — code compiles, tests
# pass on native, then the browser binary either silently no-ops or
# panics at runtime. Catching it at PR time via `cargo clippy --workspace`
# is much cheaper than catching it from a user bug report ("the red
# ball doesn't fly").
#
# Allow-list. Three classes of crate legitimately need raw fs/thread/
# instant access and override the workspace lint locally with
# `#![allow(clippy::disallowed_methods)]` at the top of `lib.rs` (or
# `main.rs` for binaries):
#
#   * lunco-assets             — owns the on-disk asset cache layout
#   * lunco-storage            — owns local-fs persistence (native only)
#   * build scripts (*build.rs)— run at compile time on the host
#   * `tests/` modules         — test fixtures live on disk
#   * native-only binaries     — `lunica`, `sandbox`, etc. (the wasm
#                                pair lives in `lunica` /
#                                `sandbox` and uses AssetServer).
#
# Adding new entries to the allow-list requires PR review; the override
# is local (a single `#![allow(...)]`), so reviewers can see and
# challenge each escape.

disallowed-methods = [
    # ── Filesystem I/O ────────────────────────────────────────────────
    # wasm32 returns `Err("operation not supported on this platform")`
    # from every fs read. Domain code must route asset reads through
    # `bevy::asset::AssetServer::load(...)` so the same call works on
    # native (default `assets/` source) and wasm (HTTP fetch).
    { path = "std::fs::read",            reason = "Use bevy::asset::AssetServer::load — std::fs is wasm-incompatible" },
    { path = "std::fs::read_to_string",  reason = "Use bevy::asset::AssetServer::load — std::fs is wasm-incompatible" },
    { path = "std::fs::File::open",      reason = "Use bevy::asset::AssetServer::load — std::fs is wasm-incompatible" },
    { path = "std::fs::write",           reason = "Use lunco-storage for persistence — std::fs is wasm-incompatible" },

    # ── Threading ────────────────────────────────────────────────────
    # wasm32-unknown-unknown has no pthread support. `std::thread::spawn`
    # panics. Off-thread work goes through a Web Worker bundle on wasm
    # (see lunica_worker) or `AsyncComputeTaskPool` (which is main-thread
    # on wasm, see `lunco-workbench` tracked-task helpers for the
    # cross-platform wrapper).
    { path = "std::thread::spawn",       reason = "Use AsyncComputeTaskPool / Web Worker — std::thread panics on wasm" },

    # ── Time ─────────────────────────────────────────────────────────
    # `std::time::Instant::now()` panics on wasm32-unknown-unknown.
    # `web_time::Instant` is a drop-in that uses `performance.now()` on
    # wasm and `std::time::Instant` on native.
    #
    # ⚠️ FREQUENT FALSE POSITIVE on the *native* target: `web_time`
    # achieves its native impl via `pub use std::time::*`, so on native
    # `web_time::Instant` IS `std::time::Instant` (same DefId). clippy
    # resolves through the re-export, so it flags *correct* code that
    # already uses `web_time::Instant` (e.g. `lunco-workbench`'s
    # status_bus). There is no way to distinguish the two on native — the
    # ban only reads true on `--target wasm32-unknown-unknown`, where
    # `web_time::Instant` is a distinct struct. So: treat native hits here
    # as noise *if* the call site imports `web_time::Instant`; only a
    # literal `std::time::Instant::now` written out is a real bug. Kept
    # for the wasm-target run and as a documentation signpost.
    { path = "std::time::Instant::now",  reason = "Use web_time::Instant — std::time::Instant panics on wasm (NOTE: false-positives on native for web_time users; see comment above)" },

    # ── Atomic re-parenting of big_space `GridAnchor` entities ─────────
    # Splitting `(ChildOf, CellCoord, Transform)` writes across separate
    # commands races against synchronous observers (this is the bug class
    # that silently marked rover chassis as `RigidBody::Static`).
    # Re-parenting `GridAnchor` entities must go through
    # `lunco_core::attach::migrate_to_grid` — see
    # `crates/lunco-core/src/attach.rs`. One-time scene-setup callsites in
    # `lunco-celestial::big_space_setup` and similar bootstrap code may
    # `#[allow(clippy::disallowed_methods)]` locally — they run before any
    # observer is registered.
    { path = "bevy_ecs::system::EntityCommands::add_child", reason = "Re-parenting a GridAnchor must use lunco_core::attach::migrate_to_grid for atomic (ChildOf, CellCoord, Transform) writes. Local #[allow] for non-spatial parenting (visuals, ports, wires)." },
    { path = "bevy_ecs::world::EntityWorldMut::add_child", reason = "See EntityCommands::add_child — same atomicity contract. Direct-World mode flushes synchronously, so a local #[allow] is fine for bootstrap code." },
    { path = "bevy_transform::commands::BuildChildrenTransformExt::set_parent_in_place", reason = "Use lunco_core::attach::migrate_to_grid. Local #[allow] for one-time scene construction in big_space_setup." },

    # ── Deep-cloning a USD stage reader ───────────────────────────────
    # `UsdStageAsset.reader` is `Arc<TextReader>` precisely so the whole
    # stage `HashMap<String, sdf::Value>` is shared by *borrow*. Writing
    # `(*stage.reader).clone()` deep-copies the entire stage per call —
    # the bug behind the 2026-05-29 sandbox FPS regression (a per-prim,
    # per-frame full-stage copy in the USD→cosim translators). Every read
    # the translators need (`get`, `iter`, `prim_attribute_value`,
    # `read_rel_target`) takes `&self`, so borrow `&*stage.reader`.
    # NOTE: cloning the `Arc` itself (`stage.reader.clone()`, a refcount
    # bump) resolves to `Arc::clone` and is NOT matched by this entry —
    # only the inner `TextReader::clone` is banned. See scripts/perf/README.md.
    { path = "openusd::usda::TextReader::clone", reason = "Borrow `&*stage.reader` — deep-cloning the stage reader copies the whole HashMap per call (caused the 2026-05-29 FPS regression). Arc::clone is fine." },
]
