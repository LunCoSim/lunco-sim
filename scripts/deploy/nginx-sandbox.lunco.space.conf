# nginx vhost for sandbox.lunco.space — serves the wasm CLIENT BUNDLE over
# HTTPS/443. The WebTransport HOST is a SEPARATE process on UDP :5888 (the
# lunco-server systemd unit); nginx does NOT proxy it (QUIC/WebTransport can't
# be reverse-proxied by stock nginx). Browser flow:
#   1. GET https://sandbox.lunco.space/         -> this vhost serves the bundle
#   2. the page dials   https://sandbox.lunco.space:5888  (WebTransport/UDP)
#      -> lunco-server, validated against the SAME Let's Encrypt cert.
#
# Install:
#   sudo cp scripts/deploy/nginx-sandbox.lunco.space.conf \
#           /etc/nginx/sites-available/sandbox.lunco.space
#   sudo ln -s /etc/nginx/sites-available/sandbox.lunco.space \
#              /etc/nginx/sites-enabled/
#   sudo certbot --nginx -d sandbox.lunco.space   # fills in the ssl_* lines
#   sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    listen [::]:80;
    server_name sandbox.lunco.space;
    # ACME http-01 challenge + redirect everything else to https.
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name sandbox.lunco.space;

    # certbot --nginx manages these two lines:
    ssl_certificate     /etc/letsencrypt/live/sandbox.lunco.space/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/sandbox.lunco.space/privkey.pem;

    # The wasm bundle produced by `scripts/build_web.sh build sandbox`
    # (dist/sandbox/), rsync'd to the box. See README.
    root /opt/lunco/web/sandbox;
    index index.html;

    # WebAssembly + correct MIME so the browser streams-compiles the .wasm.
    types { application/wasm wasm; }

    # The bundle is content-hashed on rebuild; allow long caching of the big
    # .wasm/.js but keep index.html fresh so a redeploy is picked up.
    location = /index.html { add_header Cache-Control "no-cache"; }
    location ~* \.(wasm|js|bin|zst|tar)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # SharedArrayBuffer / threaded wasm (worker) needs cross-origin isolation.
    add_header Cross-Origin-Opener-Policy   same-origin   always;
    add_header Cross-Origin-Embedder-Policy require-corp  always;

    location / { try_files $uri $uri/ /index.html; }

    # Advertise the WebTransport endpoint (optional; the page also hardcodes it).
    # add_header Alt-Svc 'h3=":5888"; ma=86400' always;
}
