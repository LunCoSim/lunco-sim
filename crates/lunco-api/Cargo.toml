[package]
name = "lunco-api"
version = "0.1.0-dev"
edition = "2021"
description = "Transport-agnostic API layer for LunCoSim — HTTP, ROS2, IPC, etc."

[features]
default = ["transport-http"]
transport-http = ["dep:axum", "dep:tokio"]

[dependencies]
lunco-core = { path = "../lunco-core" }
bevy = { workspace = true }
image = "0.25"
serde = { workspace = true }
serde_json = { workspace = true }

# Transport: HTTP (optional, feature-gated)
axum = { version = "0.8", features = ["ws"], optional = true }
tokio = { version = "1", features = ["full"], optional = true }

[lints]
workspace = true
