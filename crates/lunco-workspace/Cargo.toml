[package]
name = "lunco-workspace"
version = "0.1.0"
edition = "2021"
description = "LunCoSim's editor session (VS Code Workspace analog). Tracks open Twins + loose documents, the active Twin / Document / Perspective, and a recents list. Headless and UI-free — depends only on the bevy ECS/app substrate (no render/winit/egui), so it runs identically in a windowed editor and a `--no-ui` server."

[dependencies]
lunco-doc          = { path = "../lunco-doc" }
lunco-twin         = { path = "../lunco-twin" }
lunco-storage      = { path = "../lunco-storage" }
# Twin edit-journal persistence (B1): `JournalResource` (the in-memory journal
# handle) + `Journal` save/load. Neither depends on this crate, so no cycle.
lunco-twin-journal = { path = "../lunco-twin-journal" }
# `default-features = false` is LOAD-BEARING: lunco-doc-bevy's default `ui`
# feature pulls in bevy_egui, and cargo unifies features across the graph — so
# omitting it here switches egui/wgpu/winit ON for every consumer of this crate,
# including the `--no-ui` server and the wasm worker. See docs/reviews (A1).
lunco-doc-bevy     = { path = "../lunco-doc-bevy", default-features = false }
serde = { workspace = true }
serde_json = { workspace = true }
# Bevy ECS/app SUBSTRATE only (no render/winit/egui). Declared directly rather
# than `{ workspace = true }` so it does NOT inherit the workspace's UI feature
# list (bevy_render/bevy_winit/wayland/x11) — that keeps this crate headless and
# lets the `WorkspaceResource` binding + session events live with the data.
bevy = { version = "0.19.0", default-features = false, features = ["bevy_log"] }

[dev-dependencies]
tempfile = { workspace = true }

[lints]
workspace = true
