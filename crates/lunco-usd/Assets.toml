# lunco-usd Assets
#
# 3D models and other USD-side assets shipped as part of the
# LunCoSim library. Two-step install:
#
#   cargo run -p lunco-assets -- download   # raw `_source` glb → <cache>/
#   cargo run -p lunco-assets -- process    # processed glb → <cache>/
#
# The `process` step strips glTF extensions Bevy 0.18 doesn't support
# (`KHR_draco_mesh_compression`, `EXT_texture_webp`) by re-emitting
# the file via `npx @gltf-transform/cli`. Node.js / `npx` must be on
# PATH for the process step.
#
# The processed `.glb` lands in `<cache>/models/perseverance.glb`, but
# nothing authored refers to the cache. USD authors the LOGICAL address
# `payload = @lunco://models/perseverance.glb@`; the `lunco://` reader
# resolves `assets/` first, then the cache, so the binary is reachable
# without its storage location leaking into a shipped `.usda`.
#
# Third-party USD tools (Blender, usdview) still can't fetch it and fall
# back to the prim's local Cube placeholder (see `def Cube "Perseverance"`
# in `assets/scenes/sandbox/sandbox_scene.usda`) — but the reference is now
# a plain library path rather than a scheme naming our download cache.
# See `docs/architecture/56-asset-resolution-and-cache.md`.

[perseverance]
name = "NASA Mars 2020 Perseverance Rover (glTF)"
url = "https://assets.science.nasa.gov/content/dam/science/cds/3d/resources/model/mars-2020-perseverance-rover/Mars%202020%20Perseverance%20Rover.glb?emrc=69f2a834c1972"
# Raw download — keeps Draco geometry + WebP textures verbatim.
dest = "models/perseverance_source.glb"
sha256 = "10db7c03a5e63a5a3b3e7baa6243aa4918ba045fa8ff0a731d0217491adc727f"

[perseverance.process]
kind = "gltf"
output = "models/perseverance.glb"
