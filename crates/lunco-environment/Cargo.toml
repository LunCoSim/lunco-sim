[package]
name = "lunco-environment"
version = "0.1.0"
edition = "2021"
description = "Per-entity environmental state (gravity, atmosphere, radiation) computed from celestial body providers."

[dependencies]
bevy = { workspace = true, features = ["bevy_pbr", "bevy_gltf", "bevy_scene", "bevy_mesh", "bevy_light", "bevy_post_process", "bevy_anti_alias", "mesh_picking"] }
avian3d = { workspace = true, features = ["default-collider"] }
lunco-celestial = { path = "../lunco-celestial" }
