[package]
name = "lunco-usd-avian"
version = "0.1.0"
edition = "2021"
license.workspace = true

[dependencies]
bevy.workspace = true
avian3d.workspace = true
big_space.workspace = true
openusd = { workspace = true }
lunco-core = { path = "../lunco-core" }
lunco-environment = { path = "../lunco-environment" }
lunco-usd-bevy = { path = "../lunco-usd-bevy" }
lunco-terrain-globe = { path = "../lunco-terrain-globe" }
# The lint seam: this crate gathers USD physics FACTS; the RULES are authored in
# `assets/scripting/policy/lint_usd.rhai` and reached through the hook registry.
lunco-lint = { path = "../lunco-lint" }
lunco-hooks = { path = "../lunco-hooks" }

[features]
default = ["3d"]
3d = []

[lints]
workspace = true
