[package]
name = "lunco-sandbox-edit"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = { workspace = true, features = ["bevy_pbr", "bevy_gltf", "bevy_scene", "bevy_mesh", "bevy_light", "bevy_post_process", "bevy_anti_alias", "mesh_picking"] }
bevy_egui = { workspace = true }
lunco-theme = { path = "../lunco-theme" }
avian3d = { workspace = true }

big_space.workspace = true
transform-gizmo-bevy = "0.9.0"
bevy_picking = "0.18.1"
lunco-core = { path = "../lunco-core" }
lunco-api = { path = "../lunco-api", default-features = false }
lunco-controller = { path = "../lunco-controller" }
lunco-mobility = { path = "../lunco-mobility" }
lunco-workbench = { path = "../lunco-workbench" }
# This crate's egui inspector (`ui/inspector.rs::modelica_parameters_section`)
# uses lunco-modelica's egui UI surface (apply_ops_public etc.), so enable its
# `ui` feature. (Phase 2: when carving the headless server, sandbox-edit is a
# GUI-only crate and won't be in the server tree.)
lunco-modelica = { path = "../lunco-modelica", default-features = false, features = ["ui"] }
lunco-usd-bevy = { path = "../lunco-usd-bevy" }
lunco-usd-sim = { path = "../lunco-usd-sim" }
lunco-cosim = { path = "../lunco-cosim" }
lunco-environment = { path = "../lunco-environment" }
lunco-materials = { path = "../lunco-materials" }
lunco-avatar = { path = "../lunco-avatar" }
lunco-assets = { path = "../lunco-assets" }

[lints]
workspace = true
