[package]
name = "lunco-settings"
version = "0.1.0"
edition = "2021"
description = "Centralised user-settings system for LunCoSim. One JSON file (~/.lunco/settings.json), namespaced sections, auto-persist on change."

[dependencies]
bevy = { workspace = true, default-features = false }
serde = { workspace = true }
serde_json = { workspace = true }
lunco-assets = { path = "../lunco-assets" }
# All settings I/O — native files AND the wasm `localStorage` mirror —
# routes through the storage abstraction (`read_file_sync`/`write_file_sync`),
# never raw `std::fs` (clippy-banned, wasm-incompatible) or `web_sys`. The
# wasm `localStorage` access lives behind `lunco_storage::WebStorage`.
lunco-storage = { path = "../lunco-storage" }

[lints]
workspace = true
