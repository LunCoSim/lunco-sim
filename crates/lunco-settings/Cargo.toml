[package]
name = "lunco-settings"
version = "0.1.0"
edition = "2021"
description = "Centralised user-settings system for LunCoSim. One JSON file (~/.lunco/settings.json), namespaced sections, auto-persist on change."

[dependencies]
bevy = { workspace = true, default-features = false }
serde = { workspace = true }
serde_json = { workspace = true }
lunco-assets = { path = "../lunco-assets" }
# Native settings I/O routes through the storage abstraction rather than
# raw `std::fs` (clippy-banned, wasm-incompatible).
lunco-storage = { path = "../lunco-storage" }

# Wasm-only: persist settings to `localStorage` instead of disk
# (`std::fs::write` panics on `wasm32-unknown-unknown` for relative
# paths and silently no-ops for absolute ones). Same JSON shape on
# both sides — see `wasm_storage_read`/`wasm_storage_write` in lib.rs.
[target.'cfg(target_arch = "wasm32")'.dependencies]
web-sys = { version = "0.3", features = ["Window", "Storage"] }

[lints]
workspace = true
