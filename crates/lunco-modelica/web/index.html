<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lunica (LunCoSim Modelica Workbench)</title>
    <!-- Shared boot styles + loader card. Copied next to this file by
         scripts/build_web.sh from crates/lunco-web/web/. -->
    <link rel="stylesheet" href="./lunco-boot.css">
</head>
<body>
    <!-- Bevy owns the canvas size on wasm via `fit_canvas_to_parent` —
         don't set width/height attrs; bevy's attrs win each resize. -->
    <canvas id="bevy"></canvas>
    <script type="module">
        import init, * as wasm from './lunica.js';
        import { boot } from './lunco-boot.js';

        // Uncompressed wasm size in bytes; the `0` is replaced at build
        // time by scripts/build_web.sh so progress is accurate even when
        // nginx serves a pre-compressed .gz.
        const __LC_WASM_SIZE__ = 0;

        // Dev console bridges for the off-thread worker round-trip —
        // exposed only if this bundle actually exports them:
        //   __lc_test_worker_ping('hi')
        //   __lc_test_dispatch_compile(model, source)
        for (const k of ['__lc_test_worker_ping', '__lc_test_dispatch_compile']) {
            if (wasm[k]) window[k] = wasm[k];
        }

        boot({
            init,
            wasmUrl: './lunica_bg.wasm',
            wasmSize: __LC_WASM_SIZE__,
            title: 'Lunica',
        });
    </script>
</body>
</html>
