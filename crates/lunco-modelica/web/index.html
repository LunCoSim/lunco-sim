<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Modelica Workbench</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body, canvas { width: 100%; height: 100%; }
        body { background: #1a1a1a; }
        #loading {
            position: fixed; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: #4CAF50; font-family: sans-serif; text-align: center;
        }
    </style>
</head>
<body>
    <div id="loading">Loading...</div>
    <canvas id="bevy"></canvas>
    <script type="module">
        import init from './pkg/modelica_workbench_web.js';
        init().then(() => document.getElementById('loading').remove());
    </script>
</body>
</html>
