<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modelica Workbench</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { width: 100%; height: 100%; overflow: hidden; }
        body { background: #1a1a1a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
        /* Match the workbench backdrop so the gap between wasm init
           resolving and Bevy's first egui frame is invisible — no
           gray-flash. Bevy's clear colour paints over this once the
           render loop starts. */
        #bevy { width: 100%; height: 100%; display: block; background: #1a1a1a; }

        /* Centred loader card. Covers ONLY the crucial pre-init steps:
           wasm download → wasm init. Hidden the moment `init()` resolves.
           Non-blocking backdrop (pointer-events: none on the root)
           so the canvas underneath is interactable from the first
           paint. MSL load progress goes to the bottom status bar
           because MSL is non-blocking — the UI is fully usable while
           it streams in. */
        #loading {
            position: fixed; inset: 0;
            display: flex; align-items: center; justify-content: center;
            pointer-events: none;
            transition: opacity 0.3s ease;
            z-index: 1000;
        }
        #loading.hidden { opacity: 0; visibility: hidden; }
        #loading .card {
            min-width: 320px; max-width: 420px;
            padding: 18px 22px;
            background: rgba(20, 20, 20, 0.94);
            border: 1px solid #3a3a3a; border-radius: 10px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.6);
            pointer-events: auto;
        }
        #loading .title {
            color: #4CAF50; font-weight: 600; font-size: 14px;
            letter-spacing: 0.04em; text-transform: uppercase;
        }
        #loading .phase {
            color: #e8e8e8; font-size: 16px; margin-top: 6px;
        }
        #loading .detail {
            color: #888; font-size: 12px; margin-top: 4px;
            font-variant-numeric: tabular-nums;
        }
        #loading .bar {
            margin-top: 14px; height: 6px; width: 100%;
            background: #2a2a2a; border-radius: 3px; overflow: hidden;
        }
        #loading .bar > .fill {
            height: 100%; background: #4CAF50; width: 0%;
            transition: width 0.15s ease;
        }
        /* Indeterminate state when we don't know totals yet — gentle
           shimmer so the user can see things are alive. */
        #loading.indeterminate .bar > .fill {
            width: 35%;
            animation: shimmer 1.4s ease-in-out infinite;
        }
        @keyframes shimmer {
            0%   { margin-left: -35%; }
            100% { margin-left: 100%; }
        }
        #loading.error .title { color: #f44336; }
        #loading.error .bar > .fill { background: #f44336; }
    </style>
</head>
<body>
    <div id="loading" class="indeterminate">
        <div class="card">
            <div class="title">Modelica Workbench</div>
            <div class="phase">Starting…</div>
            <div class="detail">&nbsp;</div>
            <div class="bar"><div class="fill"></div></div>
        </div>
    </div>
    <canvas id="bevy"></canvas>
    <script type="module">
        import init from './modelica_workbench_web.js';

        const root   = document.getElementById('loading');
        const phaseE = root.querySelector('.phase');
        const detailE = root.querySelector('.detail');
        const fillE  = root.querySelector('.bar > .fill');

        function setPhase(text)   { phaseE.textContent = text; }
        function setDetail(text)  { detailE.innerHTML = text || '&nbsp;'; }
        function setProgress(pct) {
            // Determinate fill — drop the shimmer.
            root.classList.remove('indeterminate');
            fillE.style.width = `${Math.max(0, Math.min(100, pct)).toFixed(1)}%`;
        }
        function setIndeterminate() { root.classList.add('indeterminate'); }
        function setError(msg) {
            root.classList.add('error');
            root.classList.remove('indeterminate');
            setPhase('Failed');
            setDetail(msg);
            fillE.style.width = '100%';
        }

        function resize() {
            const canvas = document.getElementById('bevy');
            if (canvas) {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
        }
        window.addEventListener('resize', resize);
        resize();

        // Streaming wasm load: wraps the fetch's body in a
        // TransformStream that counts bytes for the progress UI, then
        // hands the (still-streaming) Response straight to wasm-bindgen's
        // init(). The browser compiles wasm chunks via
        // WebAssembly.compileStreaming as they arrive — overlapping
        // download and compile, which routinely cuts pre-init time by
        // 30–50 % on the 104 MB binary versus buffering first.
        function fmtBytes(n) { return (n/1048576).toFixed(1) + ' MB'; }
        function fmtRate(bps) {
            if (bps <= 0) return '';
            if (bps > 1048576) return (bps/1048576).toFixed(1) + ' MB/s';
            if (bps > 1024) return (bps/1024).toFixed(0) + ' KB/s';
            return bps.toFixed(0) + ' B/s';
        }
        function fmtEta(s) {
            if (!isFinite(s) || s <= 0) return '';
            if (s < 60) return `${Math.ceil(s)}s left`;
            const m = Math.floor(s / 60);
            const r = Math.ceil(s - m * 60);
            return `${m}m ${r}s left`;
        }

        async function streamWasmResponse(url) {
            setPhase('Loading runtime');
            setDetail('connecting…');
            setIndeterminate();
            const resp = await fetch(url);
            if (!resp.ok) throw new Error(`HTTP ${resp.status} ${resp.statusText}`);
            const totalHdr = resp.headers.get('Content-Length');
            const total = totalHdr ? parseInt(totalHdr, 10) : 0;

            const start = performance.now();
            let lastT = start;
            let lastReceived = 0;
            let received = 0;
            let speed = 0;          // EMA bytes/sec
            const SMOOTH = 0.2;

            const counter = new TransformStream({
                transform(chunk, controller) {
                    received += chunk.byteLength;
                    const now = performance.now();
                    const dt = (now - lastT) / 1000;
                    if (dt > 0.05) {
                        const inst = (received - lastReceived) / dt;
                        speed = speed === 0 ? inst : speed * (1 - SMOOTH) + inst * SMOOTH;
                        lastT = now;
                        lastReceived = received;
                    }
                    if (total > 0) {
                        setProgress((received / total) * 100);
                        const eta = speed > 0 ? (total - received) / speed : 0;
                        setDetail([
                            `${fmtBytes(received)} / ${fmtBytes(total)}`,
                            fmtRate(speed),
                            fmtEta(eta),
                        ].filter(Boolean).join(' · '));
                    } else {
                        setDetail([fmtBytes(received), fmtRate(speed)]
                            .filter(Boolean).join(' · '));
                    }
                    controller.enqueue(chunk);
                }
            });

            // Re-wrap the streamed body into a fresh Response so
            // `WebAssembly.compileStreaming` (called by wasm-bindgen
            // when init() is given a Response) can validate the MIME
            // type. Some servers don't send `Content-Type:
            // application/wasm`; force it here so streaming compile
            // doesn't fall back to buffered.
            const headers = new Headers(resp.headers);
            headers.set('Content-Type', 'application/wasm');
            return new Response(resp.body.pipeThrough(counter), {
                status: resp.status,
                statusText: resp.statusText,
                headers,
            });
        }

        // Called by wasm once Bevy has painted its first egui frame.
        // Hiding the centred loader earlier (e.g. on init() resolve)
        // shows a dark canvas with no UI for the gap while plugins
        // build + first frame is queued. The wasm side calls this
        // once via web-sys.
        window.__lc_app_ready = function () {
            root.classList.add('hidden');
            resize();
        };

        try {
            const wasmResp = await streamWasmResponse('./modelica_workbench_web_bg.wasm');
            setPhase('Starting workbench');
            setDetail('initialising…');
            setIndeterminate();
            // wasm-bindgen will pipe this Response into
            // WebAssembly.instantiateStreaming, kicking off compile as
            // chunks arrive. By the time the download finishes, most
            // of the compile is already done.
            await init({ module_or_path: wasmResp });
            // Don't hide yet — the wasm side calls __lc_app_ready()
            // after the first egui frame is painted.
            resize();
        } catch (e) {
            console.error(e);
            setError(String(e && e.message ? e.message : e));
        }
    </script>
</body>
</html>
