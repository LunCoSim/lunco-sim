[package]
name = "lunco-modelica"
version = "0.1.0"
edition = "2021"
description = "Native Modelica simulation integration for LunCoSim using Rumoca"

[[bin]]
name = "modelica_workbench"
path = "src/bin/modelica_workbench.rs"

[[bin]]
name = "modelica_workbench_web"
path = "src/bin/modelica_workbench_web.rs"

[dependencies]
bevy.workspace = true
bevy_egui.workspace = true
egui_plot = "0.34.1"
egui_code_editor = "0.2.22"
rumoca-sim = { git = "https://github.com/cognipilot/rumoca", branch = "main" }
rumoca-session = { git = "https://github.com/cognipilot/rumoca", branch = "main" }
rumoca-phase-parse = { git = "https://github.com/cognipilot/rumoca", branch = "main" }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regex = "1.10"
crossbeam-channel = "0.5"
futures-lite = "2.3.0"
log = "0.4"
lunco-core = { path = "../lunco-core" }
lunco-hardware = { path = "../lunco-hardware" }

# Desktop-only dependencies
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
tokio = { version = "1.0", features = ["full"] }
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["console"] }
console_error_panic_hook = "0.1"
getrandom = { version = "0.3", features = ["wasm_js"] }
