[package]
name = "lunco-modelica"
version = "0.1.0"
edition = "2021"
description = "Native Modelica simulation integration for LunCoSim using Rumoca"

[features]
# `lunco-api` is on by default so `cargo run --bin modelica_workbench --
# --api` Just Works for screenshot-driven debugging. Building without it
# (`cargo build --no-default-features`) drops the axum/tokio web stack,
# which matters for the wasm32 binary.
default = ["lunco-api"]
lunco-api = ["dep:lunco-api"]

[[bin]]
name = "modelica_workbench"
path = "src/bin/modelica_workbench.rs"

[[bin]]
name = "modelica_workbench_web"
path = "src/bin/modelica_workbench_web.rs"

[[bin]]
name = "msl_indexer"
path = "src/bin/msl_indexer.rs"

[dependencies]
bevy.workspace = true
bevy_egui.workspace = true
lunco-assets = { workspace = true }
lunco-core = { path = "../lunco-core" }
lunco-theme = { path = "../lunco-theme" }
lunco-doc = { path = "../lunco-doc" }
lunco-doc-bevy = { path = "../lunco-doc-bevy" }
lunco-workbench = { path = "../lunco-workbench" }
lunco-viz = { path = "../lunco-viz" }
lunco-canvas = { path = "../lunco-canvas" }
lunco-twin = { path = "../lunco-twin" }
lunco-workspace = { path = "../lunco-workspace" }
lunco-cache = { path = "../lunco-cache" }
egui-snarl = "0.9"
egui_plot = "0.34.1"
# Docs view (ModelViewMode::Docs): HTML → Markdown → egui render.
# `egui_commonmark` pulls the right `egui` version transitively to
# match bevy_egui 0.39 (→ egui 0.33). Syntax highlighting is enabled
# so `<pre><code>` blocks in Modelica docs render with colour.
egui_commonmark = { version = "0.22", features = ["better_syntax_highlighting"] }
# `all_loaders` wires up every shipped image source (file://, http://,
# bytes://, raw paths) so images in Documentation HTML render. We add
# a custom `modelica://` loader on top to resolve MSL-internal URIs
# against the on-disk MSL tree.
egui_extras = { version = "0.33", features = ["all_loaders"] }
# Pure-Rust HTML → Markdown converter. Used once per Documentation
# annotation to normalise into the shape commonmark expects.
htmd = "0.5"
# Raster decoders used by egui_extras' `all_loaders`. Only the formats
# actually present in MSL Resources/Images are enabled to keep the
# compile surface small.
image = { version = "0.25", default-features = false, features = ["png", "jpeg"] }
usvg = { version = "0.45", default-features = false }
# LunCoSim/rumoca fork, `main` branch.
# Tracks upstream rumoca. `main` already carries:
#   - the `instant::Instant` wasm32 fix that `web-fix` was carrying
#     (std::time::Instant panics on wasm32-unknown-unknown)
#   - `SimStepper` reconstruction of algebraic/output variables via the
#     retained `EliminationResult` (state()/get() now return every
#     variable, not just solver-vector entries).
rumoca-sim = { git = "https://github.com/LunCoSim/rumoca", branch = "main" }
rumoca-session = { git = "https://github.com/LunCoSim/rumoca", branch = "main" }
rumoca-phase-parse = { git = "https://github.com/LunCoSim/rumoca", branch = "main" }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regex = "1.10"
# rumoca's AST uses `indexmap::IndexMap` for class collections; we
# reference the type directly in `ast_extract` helpers so our
# hot-path extractors can walk the cached AST without any clone.
indexmap = "2.6"
futures-lite = "2.3"
crossbeam-channel = "0.5"
lunco-api = { path = "../lunco-api", optional = true }
log = "0.4"
uuid = { version = "1", features = ["v4", "serde"] }
# Native file-picker dialogs for Open Folder + Save-As. Uses the
# OS-native picker (GTK3 on Linux, COM on Windows, Cocoa on macOS)
# via rfd's default feature set.
rfd = "0.15"
# Recursive directory walking for the Twin Explorer scan.
walkdir = "2.5"

# Web-specific: wasm32-unknown-unknown needs JS interop for console output,
# panic hooks, and RNG (std::time is unavailable).
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["console", "Document", "HtmlInputElement", "Window", "File", "FileList", "FileReader", "Blob"] }
console_error_panic_hook = "0.1"
getrandom = { version = "0.3", features = ["wasm_js"] }
