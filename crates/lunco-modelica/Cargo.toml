[package]
name = "lunco-modelica"
version = "0.1.0"
edition = "2021"
description = "Native Modelica simulation integration for LunCoSim using Rumoca"

[[bin]]
name = "modelica_workbench"
path = "src/bin/modelica_workbench.rs"

[[bin]]
name = "modelica_workbench_web"
path = "src/bin/modelica_workbench_web.rs"

[[bin]]
name = "msl_indexer"
path = "src/bin/msl_indexer.rs"

[dependencies]
bevy.workspace = true
bevy_egui.workspace = true
lunco-assets = { workspace = true }
lunco-core = { path = "../lunco-core" }
lunco-doc = { path = "../lunco-doc" }
lunco-doc-bevy = { path = "../lunco-doc-bevy" }
lunco-workbench = { path = "../lunco-workbench" }
egui-snarl = "0.9"
egui_plot = "0.34.1"
usvg = { version = "0.45", default-features = false }
# Uses LunCoSim/rumoca fork (web-fix branch) which adds `instant` crate for
# wasm32 time support. std::time::Instant panics on wasm32-unknown-unknown
# because browsers restrict high-resolution clocks (Spectre mitigation).
# The fork replaces 3 imports: std::time::Instant → instant::Instant on wasm32.
rumoca-sim = { git = "https://github.com/LunCoSim/rumoca", branch = "web-fix" }
rumoca-session = { git = "https://github.com/LunCoSim/rumoca", branch = "web-fix" }
rumoca-phase-parse = { git = "https://github.com/LunCoSim/rumoca", branch = "web-fix" }
anyhow = "1.0"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
regex = "1.10"
futures-lite = "2.3"
crossbeam-channel = "0.5"
lunco-api = { path = "../lunco-api", optional = true }
log = "0.4"
uuid = { version = "1", features = ["v4", "serde"] }
# Native file-picker dialogs for Open Folder + Save-As. Uses the
# OS-native picker (GTK3 on Linux, COM on Windows, Cocoa on macOS)
# via rfd's default feature set.
rfd = "0.15"
# Recursive directory walking for the Twin Explorer scan.
walkdir = "2.5"

# Web-specific: wasm32-unknown-unknown needs JS interop for console output,
# panic hooks, and RNG (std::time is unavailable).
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["console", "Document", "HtmlInputElement", "Window", "File", "FileList", "FileReader", "Blob"] }
console_error_panic_hook = "0.1"
getrandom = { version = "0.3", features = ["wasm_js"] }
