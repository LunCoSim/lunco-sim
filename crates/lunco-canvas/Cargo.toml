[package]
name = "lunco-canvas"
version = "0.1.0"
edition = "2021"
description = "LunCoSim's generic canvas — stateful Scene + Viewport + pluggable Tools/Layers/Overlays. Domain-agnostic; drives Modelica diagrams, node-graphs, annotations, and anything else that needs a 2D scene editor."

[dependencies]
bevy_egui = { workspace = true }
indexmap = { version = "2.6", features = ["serde"] }
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
smol_str = { version = "0.2", features = ["serde"] }
