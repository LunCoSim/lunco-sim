[package]
name = "lunco-ui"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "Thin UI adapter layer for LunCoSim on top of lunco-workbench"

[dependencies]
bevy = { workspace = true }
bevy_egui = { workspace = true }
lunco-workbench = { path = "../lunco-workbench" }
lunco-theme = { path = "../lunco-theme" }
lunco-core = { path = "../lunco-core" }
lunco-celestial = { path = "../lunco-celestial" }
lunco-avatar = { path = "../lunco-avatar" }
# Time formatting/scales — reuse the spine, never re-derive JD↔UTC locally.
lunco-time = { path = "../lunco-time" }
egui_plot = { workspace = true }
web-time = { workspace = true }

[lints]
workspace = true
