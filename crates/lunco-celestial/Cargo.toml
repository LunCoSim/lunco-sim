[package]
name = "lunco-celestial"
version = "0.6.0-dev"
edition = "2021"

[features]
default = []
# Bake Earth/Moon textures + Artemis 2 mission JSON + ephemeris CSV into the
# binary via `include_bytes!`. Only needed by binaries that actually render
# celestial bodies on wasm32 (e.g. rover_sandbox_web). Off by default so the
# Modelica IDE doesn't drag in ~5 MB of textures it never uses.
embed-assets = ["dep:image"]

[dependencies]
bevy = { workspace = true, features = ["bevy_pbr", "bevy_gltf", "bevy_scene", "bevy_mesh", "bevy_light", "bevy_post_process", "bevy_anti_alias", "mesh_picking"] }
bevy_egui = { workspace = true }
lunco-workbench = { path = "../lunco-workbench" }
lunco-theme = { path = "../lunco-theme" }
bevy_shader = "0.18.1"
big_space = { workspace = true }
# Heavy VSOP2013/ELP/EOP integration lives in the sibling crate
# `lunco-celestial-ephemeris`. This crate only defines the
# `EphemerisProvider` trait and a no-op default; apps that need real
# planetary positions add the ephemeris crate's plugin.
lunco-core = { path = "../lunco-core" }
lunco-assets = { workspace = true }
avian3d = { workspace = true }
chrono = { workspace = true }
lunco-controller = { path = "../lunco-controller" }
bevy_asset = "0.18.1"
futures-lite = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
uuid = { workspace = true }
lunco-materials = { path = "../lunco-materials" }
lunco-terrain = { path = "../lunco-terrain" }
image = { workspace = true, optional = true }

# ureq is desktop-only: HTTP client with TLS for downloading ephemeris data
# On wasm32, use browser fetch() via web-sys instead
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
ureq = { version = "2.9", features = ["tls"] }

[lints]
workspace = true
