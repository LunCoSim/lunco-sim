[package]
name = "lunco-sandbox"
version = "0.6.0-dev"
edition = "2021"
license.workspace = true
# `cargo run -p lunco-sandbox` runs the GUI sandbox (not the legacy `main.rs`
# bin that carries the package name).
default-run = "sandbox"

# The app itself lives in `src/lib.rs` (`pub fn run()` + the global allocator),
# shared by the `sandbox` GUI bin here and the headless `sandbox-server` bin in
# the sibling `lunco-sandbox-server` crate — so the two can never drift.
[lib]
name = "lunco_sandbox"
path = "src/lib.rs"

[[bin]]
name = "sandbox"
path = "src/bin/sandbox.rs"
# Single desktop+web source: `build_web.sh build sandbox` compiles `lib.rs`'s
# `run()` (via this bin) for `wasm32` — `#[cfg(target_arch = "wasm32")]` blocks
# in the lib handle platform differences. Served at `dist/sandbox/`.

[dependencies]
# Render ASSET-STORE features (always on, even headless): `bevy_pbr` pulls
# `bevy_render`, which registers `Assets<Mesh>`/`Assets<StandardMaterial>` —
# USD visual sync populates the meshes avian colliders key off, and the
# `--no-ui` server still runs RenderPlugin in `backends: None` mode. `bevy_light`
# (DirectionalLight/GlobalAmbientLight) and `bevy_window` (Window/PresentMode/
# WindowPlugin types) are referenced on the headless path too, so they stay here.
# The actual WINDOWING/INTERACTION stack (winit backend, picking, post-process,
# gizmos) lives behind the `ui` feature below so a server build omits it entirely.
#
# Scene type registration: the workspace bevy baseline is `default-features =
# false`, so bevy's inventory-based `reflect_auto_register` (part of the
# `default_app` group) is OFF and the app `TypeRegistry` has none of the core
# component types. `Scene::write_to_world_with` then panics the instant a glTF
# `SceneRoot` spawns ("unregistered type `bevy_camera::visibility::Visibility`").
# We deliberately do NOT re-enable `reflect_auto_register`: it drags the whole
# inventory registration closure into the final link, which tipped clang's
# command line past its internal limit (link aborted with `std::length_error`).
# Instead `UsdBevyPlugin` explicitly `register_type`s the bounded set of
# glTF/USD scene component types — see `crates/lunco-usd-bevy/src/lib.rs`.
# NO `bevy_pbr`. It used to be here for the render ASSET STORES, on the theory that
# the `--no-ui` server needs `Assets<StandardMaterial>` even with
# `RenderPlugin { backends: None }`. It does not any more: no crate in the headless
# closure names a material — they state `PbrLook`/`ShaderLook` intent, and the
# binder that turns intent into an asset lives behind the `ui` feature with
# `lunco-render-bevy`. Re-adding `bevy_pbr` here silently re-links wgpu + naga into
# the server. The CI guard in `.github/workflows/lint.yml` fails if it comes back.
bevy = { workspace = true, features = ["bevy_gltf", "bevy_world_serialization", "bevy_mesh", "bevy_light", "bevy_window"] }
avian3d = { workspace = true }
lunco-physics = { workspace = true }
# The sky-clock panel drives the celestial clock (`SetClock`) directly.
lunco-time = { path = "../lunco-time" }
big_space = { workspace = true }
leafwing-input-manager = { workspace = true }
lunco-core = { path = "../lunco-core" }
lunco-hardware = { path = "../lunco-hardware" }
# The PRODUCER of `SampledParameter`. Its consumer (`lunco-api`'s
# `sampled_param_observer` — i.e. `SubscribeTelemetry`) was already shipped and
# wired, so leaving this out meant the API advertised parameter telemetry that could
# never arrive. Render-free: it is the eyes-and-ears of a `--no-ui` run.
lunco-telemetry = { path = "../lunco-telemetry" }
lunco-mobility = { path = "../lunco-mobility" }
lunco-controller = { path = "../lunco-controller" }
lunco-autopilot = { path = "../lunco-autopilot" }
# `default-features = false` drops avatar's egui/workbench/gizmo UI layer for the
# lean server; the `ui` feature below re-enables it (`lunco-avatar/ui`) for the
# GUI build. (Template for the celestial/usd/sandbox-edit pass — until those are
# gated too, their transitive `lunco-avatar` (default) edges keep avatar/ui on
# in non-server builds via Cargo feature unification.)
lunco-avatar = { path = "../lunco-avatar", default-features = false }
lunco-render = { path = "../lunco-render" }
# The bevy_pbr binding layer. Added as a PLUGIN only in non-headless builds
# (`SandboxCorePlugin::build`), which is the entire render gate.
#
# THE RENDER GATE, at the dependency level. `lunco-render-bevy` is the one crate
# that names `bevy_pbr`, so making it `optional` + `ui`-only is what finally stops
# the `--no-ui` server from LINKING wgpu/naga, not merely from running them.
#
# This was blocked until every domain crate stopped naming materials directly
# (terrain-surface, celestial, usd-bevy, usd-sim, sandbox-edit, environment,
# obstacle-field, and finally lunco-materials itself). That is now done — they all
# state INTENT (`PbrLook` / `ShaderLook` / `SceneCamera`) instead.
# See docs/architecture/render-decoupling.md.
lunco-render-bevy = { path = "../lunco-render-bevy", optional = true }
# Engine light-handling policy (ShadowCastingSettings) is a client render
# concern, so the settings dep rides the `ui` feature (see `light_policy.rs`).
lunco-settings = { path = "../lunco-settings", optional = true }
# serde derives for the `ShadowCastingSettings` settings section (ui-gated).
serde = { workspace = true, optional = true }
# `default-features = false` drops celestial's egui inspector (`CelestialUiPlugin`,
# not used by the sandbox bin). The `celestial` feature still pulls embed-assets.
lunco-celestial = { path = "../lunco-celestial", default-features = false }
# Real VSOP2013/ELP ephemeris on EVERY platform (wasm included — the
# JPL-Horizons network fetch is cfg-gated inside the plugin; the analytic
# series are pure Rust). Comms link geometry + the orbital view need real
# body positions in the browser build too.
lunco-celestial-ephemeris = { path = "../lunco-celestial-ephemeris" }
lunco-terrain-globe = { path = "../lunco-terrain-globe" }
lunco-obstacle-field = { path = "../lunco-obstacle-field" }
lunco-terrain-surface = { path = "../lunco-terrain-surface" }
lunco-modelica = { path = "../lunco-modelica", default-features = false }
# Experiment registry types — used by the experiment-journal replay leg AND the
# all-platform result-artifact persistence (write/load). Unconditional: result
# persistence is a core (not networking) feature, and experiments is a pure crate.
lunco-experiments = { path = "../lunco-experiments" }
# Result-artifact (de)serialization (RunResult ↔ JSON) for persistence. Core.
serde_json = { workspace = true }
lunco-cosim = { path = "../lunco-cosim" }
lunco-environment = { path = "../lunco-environment" }
lunco-scripting = { path = "../lunco-scripting" }
# USD core (scene load + collider build) is always needed; its Twin-browser /
# viewport egui UI rides `lunco-usd/ui`, re-enabled below by the `ui` feature.
lunco-usd = { path = "../lunco-usd", default-features = false }
# Live canonical stage read path (`CanonicalStages` / `StageView` / `UsdRead`):
# the USD-reading systems below read the LIVE composed stage first, falling back
# to the flattened `stage.reader` only for recipe-less legacy assets.
lunco-usd-bevy = { path = "../lunco-usd-bevy" }
# `cosim::SceneLoadInFlight` for `report_scene_spawn_status`, which mirrors "scene
# prims are still spawning" onto the workbench `StatusBus` — where the offline
# recorder's readiness gate reads it. Adds NOTHING to the dependency graph:
# `lunco-usd` already pulls this crate in, so naming it here only makes the type
# reachable from this one.
lunco-usd-sim = { path = "../lunco-usd-sim" }
# USD→terrain projection: authored terrain prims → DEM request + layer stack, and
# hand edits back onto the document's runtime layer. Render-free, so the headless
# server gets its terrain collider without linking any UI.
lunco-usd-terrain = { path = "../lunco-usd-terrain" }
openusd = { workspace = true }
# The scene/document COMMAND LAYER — NOT optional: the headless server needs its
# `commands::SpawnCommandPlugin` (runtime spawn/move + `NetReplicate` tagging) and
# the journaled shader domain. Render-free, UI-free.
lunco-scene-commands = { path = "../lunco-scene-commands" }
# The in-scene EDITOR (gizmo, selection, inspector, physics-viz, spawn ghost).
# Optional + `ui`-only: the server used to link a crate called "edit" purely to get
# `SpawnEntity`, which now lives in `lunco-scene-commands` above. A `--no-ui` build
# no longer contains the editor at all.
lunco-sandbox-edit = { path = "../lunco-sandbox-edit", default-features = false, optional = true }
lunco-web = { workspace = true }
lunco-assets = { workspace = true }
lunco-workspace = { path = "../lunco-workspace" }
lunco-twin = { path = "../lunco-twin" }
# Canonical Twin change-journal (`TwinJournalPlugin` / `JournalResource`), added
# by `SandboxCorePlugin` as core substrate so the headless server + clients
# record edits (not just the egui workbench). `default-features = false` keeps
# `lunco-doc-bevy/ui` (→ bevy_egui) off the headless server (CQ-601).
lunco-doc-bevy = { path = "../lunco-doc-bevy", default-features = false }
# Journal entry ids for the client-side journal→scene replay driver (Layer B).
# Optional — only the `networking` build's `replay_scenario_journal` uses it.
lunco-twin-journal = { path = "../lunco-twin-journal", optional = true }
# ── UI-only crate deps (gated behind the `ui` feature) ────────────────────
# A `--no-ui` server build (`--no-default-features --features server`) omits
# these entirely: the egui workbench, the blueprint/shader material editors,
# the doc/theme/general-UI crates. sandbox.rs cfg-gates every use behind
# `feature = "ui"`.
lunco-materials = { path = "../lunco-materials", optional = true }
# Not optional/ui-gated: the doc subsystem (DocumentId, edit authoring) is a core,
# headless-safe concern — not a UI feature. Already compiled transitively via
# lunco-doc-bevy, so naming it directly adds no build cost. Was under `ui` only because
# one UI panel imported DocumentId (CQ: de-UI-gate the doc subsystem).
lunco-doc = { path = "../lunco-doc" }
lunco-theme = { path = "../lunco-theme", optional = true }
lunco-workbench = { path = "../lunco-workbench", optional = true }
lunco-tutorial = { path = "../lunco-tutorial", optional = true }
bevy_egui = { workspace = true, optional = true }
# `default-features = false` so the native (`lunco-api`) and web (`web`)
# features choose the transport: `transport-http` (axum/TcpListener) vs.
# `transport-wasm` (the `window.lunco_api` JS bridge).
lunco-api = { path = "../lunco-api", optional = true, default-features = false }
# `default-features = false`: networking's egui/workbench `ui` feature is opt-in
# (CQ-601). The GUI build re-enables it via this crate's `ui` feature
# (`lunco-networking?/ui`); the headless `server` build leaves it off.
lunco-networking = { path = "../lunco-networking", optional = true, default-features = false }
# Cross-platform I/O layer (native FileStorage / wasm WebStorage). Used by the
# `luncosim://` scheme handler AND all-platform result-artifact persistence, so
# it's unconditional — storage is the loading layer, not a networking concern.
lunco-storage = { path = "../lunco-storage" }

# Replace glibc's allocator with mimalloc on native targets. Bevy +
# avian generate huge cross-thread allocator traffic; glibc's
# arena-per-thread fallback still hits a global lock which serialised
# our hot frames against the avian contact-graph rebuild. mimalloc
# uses per-thread heaps and lock-free fast paths, giving consistent
# frame times. Wasm has its own allocator path, so this dep is native-
# only.
[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
mimalloc = "0.1"

[features]
# `ui` + `lunco-api` + `networking` are on by default so native
# `cargo run --bin sandbox` Just Works (windowed GUI + HTTP API + the multiplayer
# wire — the in-app Network → Connect button and `--connect`/`--host` flags are
# live without an extra `--features` flag). A lean HEADLESS server drops the GUI:
#   cargo build -p lunco-sandbox --bin sandbox --no-default-features --features server
# which omits winit/wayland/x11/egui/picking/gizmos + the workbench/material/doc
# UI crates entirely — the SAME `sandbox` bin, just a different feature set. Single-
# player with no wire: `--no-default-features --features ui,celestial,lunco-api`.
# The wasm build sets its own feature set (`--no-default-features`), so this
# default does not affect it.
default = ["ui", "celestial", "lunco-api", "transport-http", "networking"]
# Windowed GUI: the winit windowing backend + render-effect features + every
# UI crate (egui workbench, material editors, doc/theme/ui). Off for a headless
# server.
#
# `dep:lunco-render-bevy` — THE RENDER GATE. This is the crate that names
# `bevy_pbr`, so gating it here is what keeps wgpu + naga out of the `--no-ui`
# server's LINK, not just out of its runtime. Domain crates state appearance as
# intent (`PbrLook`/`ShaderLook`/`SceneCamera`); this binds it.
# See docs/architecture/render-decoupling.md.
ui = [
    # The screenshot backend lives in the workbench, which only a GUI build links at all.
    # NOT on the `lunco-api` feature: the headless server enables that too, and hanging the
    # workbench off it dragged egui + wgpu straight back into the --no-ui binary.
    "lunco-workbench/api",
    "dep:lunco-render-bevy",
    "lunco-avatar/ui",
    "lunco-usd/ui",
    "dep:lunco-sandbox-edit",
    "lunco-sandbox-edit/ui",
    "lunco-modelica/ui",
    # egui presence/tutorial overlays + Network menu bridge — only when networking
    # is also enabled (`?`); the headless server's `server` feature omits this.
    "lunco-networking?/ui",
    "lunco-api?/winit",
    "dep:lunco-workbench",
    "dep:lunco-tutorial",
    "dep:lunco-materials",
    "dep:lunco-theme",
    "dep:lunco-settings",
    "dep:serde",
    "dep:bevy_egui",
    "bevy/bevy_winit",
    "bevy/x11",
    "bevy/wayland",
    "bevy/webgl2",
    # Runtime PNG decode for `bevy_image`'s ImageLoader — terrain colour/layer
    # maps (the twin's `color.png`) load through the asset server. The workspace
    # bevy baseline ships no image codecs; render builds opt in per-consumer.
    "bevy/png",
    "bevy/bevy_picking",
    "bevy/mesh_picking",
    "bevy/bevy_post_process",
    "bevy/bevy_anti_alias",
    "bevy/smaa_luts",
    "bevy/tonemapping_luts",
    "bevy/bevy_gizmos",
    "bevy/bevy_gizmos_render",
]
# Lean headless multiplayer server: API + networking host, NO `ui`. Build with
# `--no-default-features --features server`. Skips `celestial` (bundled Earth
# texture + ephemeris, ~10s of MB) — the server only needs `GravityPlugin`,
# always compiled.
server = ["lunco-api", "transport-http", "networking"]
# `celestial` pulls in lunco-celestial's bundled Earth texture + Artemis-II
# ephemeris (10s of MB). Off for the wasm sandbox build — it only needs
# `GravityPlugin`, which is always compiled.
celestial = ["lunco-celestial/embed-assets"]
sandbox = []
# Compile the API in. Transport is chosen automatically: the native HTTP
# server comes from `lunco-api/transport-http` (added to `default` above);
# the wasm build (`build_web.sh --features lunco-api`) gets the
# `window.lunco_api` JS bridge automatically via `cfg(target_arch="wasm32")`.
lunco-api = ["dep:lunco-api", "lunco-modelica/lunco-api"]
# Native HTTP API transport (axum/TcpListener) — also the gate for the in-app
# rhai REPL panel, which needs `lunco_api::ApiBridge` (present under this feature
# on native, and always on wasm). In `default` + `server`; the wasm build gets
# the bridge automatically via `cfg(target_arch="wasm32")`.
transport-http = ["lunco-api/transport-http", "lunco-networking?/transport-http"]
# Multiplayer over WebTransport (lightyear). Pulls in the real networking
# adapter; the wire substrate (lunco-api) is required.
networking = ["dep:lunco-networking", "lunco-networking/networking", "lunco-api", "dep:lunco-twin-journal"]
# Netcode jitter diagnostics — off by default (not in normal builds). Build with
# `--features networking,net-diag` when debugging; see lunco-networking/diagnostics.rs.
net-diag = ["networking", "lunco-networking/net-diag"]
# Drive-actuation chain tracing — off by default. Build with `--features
# drive-diag` to trace the DriveCommand → port → wheel-force path when a rover
# won't move / snaps back; see lunco-mobility's `drive_diag!`.
drive-diag = ["lunco-mobility/drive-diag"]
python = ["lunco-scripting/python"]
# Tracy profiler. Enable with `--features tracy` and connect a Tracy
# GUI to see per-system flame graphs. Match the GUI version to the
# tracy-client version pulled in by Bevy 0.18 (check `cargo tree -p
# tracy-client` after enabling).
tracy = ["bevy/trace_tracy"]

# Web-specific: wasm32-unknown-unknown needs JS interop for console output,
# panic hooks, and RNG (std::time is unavailable on wasm32).
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = { workspace = true }
# Drive the rhai REPL panel's async bridge call on wasm (no threads → `spawn_local`).
wasm-bindgen-futures = { workspace = true }
console_error_panic_hook = { workspace = true }
# URL-parameter boot path (`?workspace=…&open=…`) reads `window.location.search`.
web-sys = { workspace = true, features = ["Window", "Location"] }
js-sys = { workspace = true }
# ahash (egui 0.26.2 → catppuccin-egui → lunco-theme) and lightyear's netcode
# RNG pull getrandom 0.3, which on wasm needs an explicit backend. Enable the
# browser-crypto (`wasm_js`) feature here; build_web.sh sets the matching
# `--cfg getrandom_backend="wasm_js"` (both are required).
getrandom = { version = "0.3", features = ["wasm_js"] }

[lints]
workspace = true
