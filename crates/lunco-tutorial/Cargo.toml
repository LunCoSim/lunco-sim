[package]
name = "lunco-tutorial"
version = "0.1.0-dev"
edition = "2021"
license.workspace = true
description = "Unified tutorial launcher for every workbench app: a registry of tutorials, a dockable launcher panel + menu, progress persistence, F1, and the runtime-fidelity toggle. A tutorial is ONE thing ‚Äî a `.rhai` scenario ‚Äî which the launcher runs on a host entity; the scenario sets up its own environment (`load_scene`, `open_class`). No scene-vs-script duality, no simulation logic of its own."

[dependencies]
bevy = { workspace = true }
bevy_egui = { workspace = true }
# `Command` / `on_command` / `register_commands!` macros + `TelemetryEvent`
# (mission-complete detection) + `SubsystemToggles` (fidelity ramp).
lunco-core = { path = "../lunco-core" }
# `Panel` / `PanelCtx` / `WorkbenchAppExt::register_panel` for the launcher,
# and `TutorialHud` to clear the HUD on skip.
lunco-workbench = { path = "../lunco-workbench" }
# `ApiCommandEvent` ‚Äî the fidelity toggle & notifications dispatch generically.
# `default-features = false` is LOAD-BEARING ‚Äî lunco-api's defaults include its
# `render` feature (‚Üí bevy_render ‚Üí wgpu/naga), and cargo unifies features across
# the graph, so omitting it re-links the GPU stack into the `--no-ui` server.
# See docs/architecture/render-decoupling.md.
lunco-api = { path = "../lunco-api", default-features = false }
# Persisted per-tutorial progress (completed set + last-started).
lunco-settings = { path = "../lunco-settings" }
# Workspace structure and active Twin session tracking.
lunco-workspace = { path = "../lunco-workspace" }
# The ONE delivery: `RunScenario` attaches a tutorial's `.rhai` to a host entity.
lunco-scripting = { path = "../lunco-scripting" }
# `tutorial_source(rel)` ‚Äî loads a tutorial's `.rhai` (disk on native, embedded
# on wasm). Every tutorial in every app flows through this one loader.
lunco-assets = { path = "../lunco-assets" }
# `EditorIntent::ShowTutorial` ‚Äî F1 ‚Üí the keybinding‚Üíintent‚Üícommand path.
lunco-doc-bevy = { path = "../lunco-doc-bevy", default-features = false }
# The boot-entry hook: `consult_boot` invokes the `BOOT_HOOK` rhai policy to
# decide startup (onboard / load / nothing) ‚Äî no onboarding logic in Rust.
lunco-hooks = { path = "../lunco-hooks" }
serde = { workspace = true }
serde_json = { workspace = true }

[lints]
workspace = true
