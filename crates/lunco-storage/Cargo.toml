[package]
name = "lunco-storage"
version = "0.1.0"
edition = "2021"
description = "I/O abstraction for LunCoSim — Storage trait + backends (FileStorage today; IndexedDB/OPFS/HTTP tomorrow). Keeps the document and workspace layers free of filesystem assumptions so the same save/load flow works on native, web, and remote twins."

[dependencies]
# NOTE: no `rfd` here. File-open/save dialogs are a UI concern and live in
# `lunco_workbench::picker` (which has its own `rfd`). Keeping the dialog crate
# out of this widely-depended-on I/O abstraction keeps `rfd`→wayland/ashpd off
# the headless server and every other non-UI consumer.
thiserror = { workspace = true }
serde = { workspace = true }
async-trait = { workspace = true }
futures-lite = { workspace = true }

# Wasm-only: the `WebStorage` backend persists to the browser's
# `localStorage`. Native builds use `FileStorage` (std::fs) and pull none
# of this. `Window` + `Storage` are the only web-sys features needed.
[target.'cfg(target_arch = "wasm32")'.dependencies]
web-sys = { workspace = true, features = ["Window", "Storage"] }

[features]
# Empty stubs that unlock the corresponding `StorageHandle` variants.
# Off by default — turning one on keeps match arms in downstream crates
# exhaustive against the upcoming backend without forcing a rebuild
# across the whole workspace when the backend itself lands.
default = []
fsa_stub = []
idb_stub = []
opfs_stub = []
http_stub = []

[lints]
workspace = true
