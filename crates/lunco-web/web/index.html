<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>__LC_NAME__ — LunCoSim</title>
    <!-- Empty data-URI icon suppresses the browser's automatic
         /favicon.ico request (and its 404) without shipping a file. -->
    <link rel="icon" href="data:,">
    <!-- Shared boot styles + loader card (lunco-boot.css, copied here). -->
    <link rel="stylesheet" href="./lunco-boot.css">
</head>
<body>
    <!-- Bevy owns the canvas size on wasm via `fit_canvas_to_parent` —
         don't set width/height attrs; bevy's attrs win each resize. -->
    <canvas id="bevy"></canvas>
    <script type="module">
        // ONE template for every LunCoSim wasm app. scripts/build_web.sh
        // fills the placeholders per target:
        //   __LC_BUNDLE__    cargo bin / wasm-bindgen out-name (e.g. lunica)
        //   __LC_NAME__      display name (capitalised bundle, e.g. Lunica)
        //   __LC_WASM_SIZE__ uncompressed wasm bytes (accurate gzip_static progress)
        import init, * as wasm from './__LC_BUNDLE__.js';
        import { boot } from './lunco-boot.js';

        // NB: capping the web render resolution by overriding `devicePixelRatio`
        // does NOT work — winit's `fit_canvas_to_parent` sizes the drawing buffer
        // from the real device-pixel content box regardless, so it only shrinks the
        // egui UI (which reads the DPR) with no fill-rate win. A proper 3D
        // render-scale needs a reduced-resolution render target, not a DPR hack.

        // ── Modelica worker preload (memory) ─────────────────────────────────
        // The Modelica engine can preload the full parsed MSL (~140 MB) into every
        // Fast-Run worker at boot for parallel experiment runs. That costs hundreds
        // of MB and OOMs a memory-constrained tab, so it is OFF by default (single
        // compiles/runs still work; Fast Runs serialize on one worker). Turn it back
        // on for full parallelism by setting this BEFORE boot:
        //     window.__lc_worker_preload = true;

        const __LC_WASM_SIZE__ = 0;

        // Bridges exposed on `window` only if this bundle actually exports
        // them (a future app might not):
        //   __lc_test_*  — dev console hooks for the off-thread worker.
        //   lunco_api    — the in-browser API bridge (lunco-api compiled for
        //                  wasm). Same JSON envelope as the native HTTP API:
        //                  `await window.lunco_api('{"command":"Ping"}')`.
        //   lunco_rhai   — rhai one-shot convenience over lunco_api:
        //                  `await window.lunco_rhai('restart_scene(); pause()')`.
        for (const k of ['__lc_test_worker_ping', '__lc_test_dispatch_compile', 'lunco_api', 'lunco_rhai']) {
            if (wasm[k]) window[k] = wasm[k];
        }

        // Autoload the deploy's default scene once the app is live.
        //
        // Fully dynamic — NOT compiled in. `scenes.json` is a plain file next
        // to the wasm, written by scripts/build_web.sh and editable after
        // deploy: add/remove scenes or repoint `default` with no rebuild.
        // Absent (e.g. lunica, or a sandbox deploy that wants the built-in
        // scene) → 404 → this is a no-op. Shape:
        //   { "default": "twins/moonbase/moonbase_scene.usda",
        //     "scenes": [ { "name": "Moonbase",
        //                   "path": "twins/moonbase/moonbase_scene.usda" } ] }
        async function autoloadDefaultScene() {
            if (typeof window.lunco_api !== 'function') return;   // app w/o API bridge
            // A ?scene=<path> deep-link (or ?scene=none to opt out) wins over
            // the deploy default, so shared links keep pointing where they aim.
            const q = new URL(location.href).searchParams.get('scene');
            if (q === 'none') return;
            let path = q;
            if (!path) {
                let cfg;
                try {
                    const r = await fetch('./scenes.json', { cache: 'no-cache' });
                    if (!r.ok) return;                            // no config for this deploy
                    cfg = await r.json();
                } catch { return; }
                path = cfg && cfg.default;
            }
            if (!path) return;
            try {
                const res = await window.lunco_api(JSON.stringify({
                    command: 'LoadScene', params: { path },
                }));
                console.log('[autoload] default scene', path, res);
            } catch (e) {
                console.error('[autoload] LoadScene failed', path, e);
            }
        }

        boot({
            init,
            wasmUrl: './__LC_BUNDLE___bg.wasm',
            wasmSize: __LC_WASM_SIZE__,
            title: '__LC_NAME__',
            onReady: autoloadDefaultScene,
        });
    </script>
</body>
</html>
