[package]
name = "lunco-web"
version = "0.1.0"
edition = "2021"
license.workspace = true
description = "Shared web-frontend boot library for LunCoSim wasm apps: the streaming loader (web/lunco-boot.{js,css}) plus WebReadyPlugin, which signals the HTML loader once Bevy paints its first frame."

[dependencies]
bevy = { workspace = true }

# Wasm-only: call the page's `window.__lc_app_ready()` hook. Native is a
# no-op so `app.add_plugins(WebReadyPlugin)` compiles on every target.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = { workspace = true }
js-sys = { workspace = true }
web-sys = { workspace = true, features = ["Window"] }

[lints]
workspace = true
