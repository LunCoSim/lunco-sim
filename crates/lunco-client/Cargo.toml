[package]
name = "lunco-client"
version = "0.6.0-dev"
edition = "2021"

[[bin]]
name = "rover_sandbox"
path = "src/bin/rover_sandbox.rs"

[[bin]]
name = "rover_sandbox_usd"
path = "src/bin/rover_sandbox_usd.rs"

[[bin]]
name = "lunco_client_web"
path = "src/bin/lunco_client_web.rs"

[[bin]]
name = "model_viewer"
path = "src/bin/model_viewer.rs"

[dependencies]
bevy = { workspace = true, features = ["default"] }
avian3d = { workspace = true }
big_space = { workspace = true }
leafwing-input-manager = { workspace = true }
lunco-core = { path = "../lunco-core" }
lunco-hardware = { path = "../lunco-hardware" }
lunco-mobility = { path = "../lunco-mobility" }
lunco-robotics = { path = "../lunco-robotics" }
lunco-controller = { path = "../lunco-controller" }
lunco-fsw = { path = "../lunco-fsw" }
lunco-obc = { path = "../lunco-obc" }
lunco-attributes = { path = "../lunco-attributes" }
lunco-avatar = { path = "../lunco-avatar" }
lunco-celestial = { path = "../lunco-celestial" }
lunco-modelica = { path = "../lunco-modelica" }
lunco-usd = { path = "../lunco-usd" }
lunco-usd-avian = { path = "../lunco-usd-avian" }
lunco-usd-bevy = { path = "../lunco-usd-bevy" }
lunco-usd-sim = { path = "../lunco-usd-sim" }
lunco-sandbox-edit = { path = "../lunco-sandbox-edit" }
bevy_workbench = "0.3"
lunco-ui = { path = "../lunco-ui" }
openusd = { workspace = true }
bevy_egui = { workspace = true }
bevy-inspector-egui = { workspace = true }

[features]
default = ["celestial"]
celestial = []
sandbox = []

# Web-specific: wasm32-unknown-unknown needs JS interop for console output,
# panic hooks, and RNG (std::time is unavailable on wasm32).
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = "0.2"
wasm-bindgen-futures = "0.4"
web-sys = { version = "0.3", features = ["console", "Document", "HtmlInputElement", "Window"] }
console_error_panic_hook = "0.1"
# getrandom with js feature enables wasm32 support for rand/uuid and other transitive deps
getrandom = { version = "0.2", features = ["js"] }
instant = "0.1"
