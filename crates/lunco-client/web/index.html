<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox (LunCoSim)</title>
    <!-- Shared boot styles + loader card. Copied next to this file by
         scripts/build_web.sh from crates/lunco-web/web/. -->
    <link rel="stylesheet" href="./lunco-boot.css">
</head>
<body>
    <!-- Bevy owns the canvas size on wasm via `fit_canvas_to_parent` —
         don't set width/height attrs; bevy's attrs win each resize. -->
    <canvas id="bevy"></canvas>
    <script type="module">
        import init, * as wasm from './sandbox.js';
        import { boot } from './lunco-boot.js';

        // Uncompressed wasm size in bytes; the `0` is replaced at build
        // time by scripts/build_web.sh.
        const __LC_WASM_SIZE__ = 0;

        // Dev console bridges — exposed only if this bundle exports them
        // (the sandbox embeds the Modelica workbench, which carries them).
        for (const k of ['__lc_test_worker_ping', '__lc_test_dispatch_compile']) {
            if (wasm[k]) window[k] = wasm[k];
        }

        boot({
            init,
            wasmUrl: './sandbox_bg.wasm',
            wasmSize: __LC_WASM_SIZE__,
            title: 'Sandbox',
        });
    </script>
</body>
</html>
