[package]
name = "lunco-scripting"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = { workspace = true }
lunco-core = { path = "../lunco-core" }
lunco-doc = { path = "../lunco-doc" }
lunco-api = { path = "../lunco-api" }
pyo3 = { version = "0.23", optional = true }
mlua = { version = "0.10", features = ["lua54", "vendored"] }
libloading = { version = "0.8", optional = true }
serde = { version = "1.0", features = ["derive"] }

[features]
default = ["python"]
python = ["dep:pyo3", "dep:libloading"]

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
# We want python by default on desktop, but never on wasm
# This is handled by the default features and conditional compilation in code
serde_json = "1.0"
parking_lot = "0.12"
crossbeam-channel = "0.5"
