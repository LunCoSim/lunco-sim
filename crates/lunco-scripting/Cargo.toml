[package]
name = "lunco-scripting"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = { workspace = true }
lunco-doc = { path = "../lunco-doc" }
# Script execution is exposed as typed `#[Command]`s (RunPython/RunLua) via
# the macros + `Ack`/`OpId`/`CommandResults` substrate in lunco-core. The API
# discovers them by reflection (AppTypeRegistry) — no direct lunco-api dep.
lunco-core = { path = "../lunco-core" }
pyo3 = { version = "0.23", optional = true }
libloading = { version = "0.8", optional = true }
serde = { workspace = true }
serde_json = { workspace = true, optional = true }
anyhow = { workspace = true }

[features]
default = []
python = ["dep:pyo3", "dep:libloading", "dep:serde_json"]

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
crossbeam-channel = { workspace = true }

[lints]
workspace = true
