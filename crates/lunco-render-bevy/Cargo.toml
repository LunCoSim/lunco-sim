[package]
name = "lunco-render-bevy"
version = "0.1.0"
edition = "2021"
description = "The bevy_pbr binding layer for LunCoSim. Domain crates state appearance INTENT (lunco-render); this crate is the only one that turns it into a concrete material. Keeping bevy_pbr (and therefore bevy_render â†’ wgpu/naga) confined here is what lets the --no-ui server and the wasm worker link without a GPU stack. Mirrors the lunco-doc / lunco-doc-bevy and lunco-usd / lunco-usd-bevy split."

[dependencies]
# THE ONLY `bevy_pbr` IN THE WORKSPACE'S DOMAIN GRAPH. If you find yourself adding
# it to another crate's feature list, that crate is binding a material it should be
# *declaring* instead â€” see docs/architecture/render-decoupling.md.
# `bevy_post_process` + `bevy_anti_alias` are here for the SceneCamera binder
# (Bloom / Tonemapping / Msaa). They pull bevy_core_pipeline â†’ bevy_render, which is
# exactly why this crate exists: those names are confined here so a domain crate can
# say "I am the scene camera" without linking a GPU stack to say it.
# `bevy_text` + `bevy_sprite_render` + `default_font` are here for the `WorldLabel`
# binder (`Text2d`). They pull bevy_render, which is exactly why they belong on THIS
# side of the boundary â€” a domain crate can now say "this spacecraft is labelled X"
# without linking a text rasteriser.
bevy = { workspace = true, features = ["bevy_pbr", "bevy_mesh", "bevy_light", "bevy_image", "bevy_post_process", "bevy_anti_alias", "tonemapping_luts", "bevy_text", "bevy_sprite_render", "default_font", "zstd_rust"] }
lunco-render = { path = "../lunco-render" }
# `ShaderLook` (the custom-shader intent) + `ShaderMaterial` (the thing it binds
# to). `lunco-materials` is render-only by nature â€” it owns the `AsBindGroup` â€” so
# it belongs on THIS side of the boundary, not in a domain crate.
lunco-materials = { path = "../lunco-materials" }
# The static-mesh terrain's derived-layer bind (`terrain_maps.rs`). Its material is
# authored asynchronously by `lunco-usd-sim`, so there is no intent component to
# edit â€” filling its map slots means naming `MeshMaterial3d<ShaderMaterial>`, which
# only this crate may do. Moving that one system here is what let
# `lunco-terrain-surface` stop naming a material at all.
lunco-terrain-surface = { path = "../lunco-terrain-surface" }
# The horizon heightfield/shadow-cache BAKES (render-free, they stay there) plus
# `SetEnvironmentLight`. The two render-bound halves â€” the per-frame uniform feed
# into the terrain shader (`horizon_shade.rs`) and the command's `bloom` arm
# (`env_light.rs`) â€” moved HERE, which is what let `lunco-environment` drop wgpu.
lunco-environment = { path = "../lunco-environment" }
lunco-core = { path = "../lunco-core" }

[lints]
workspace = true
