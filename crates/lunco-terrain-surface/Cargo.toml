[package]
name = "lunco-terrain-surface"
version = "0.1.0-dev"
edition = "2021"
description = "Local high-detail DEM ground terrain (surface scale): heightfield colliders, CDLOD tile streaming, big_space per-tile anchoring. The 'surface' projection of the terrain family; pairs with lunco-terrain-globe over the shared lunco-terrain-core LOD spine."

[dependencies]
# The projection-agnostic LOD spine (quadtree-CDLOD selection, tile-grid ring
# math, the `HeightSource` trait) lives in the pure leaf `lunco-terrain-core`
# (std + serde only), shared with the cube-sphere planetary tiler. This crate is
# the PLANAR DEM adapter: it adds render/physics/big_space/DEM layers on top.
lunco-terrain-core = { path = "../lunco-terrain-core" }
bevy = { workspace = true, features = ["bevy_pbr", "bevy_mesh", "bevy_render", "bevy_light"] }
bevy_mesh = { workspace = true }
lunco-core = { path = "../lunco-core" }
# Read-side query seam: register a `TerrainHeight` provider into the shared
# `ApiQueryRegistry` so scripts/HTTP/MCP can sample the DEM height field via
# `query("TerrainHeight", #{x, z})` â€” no terrain dep leaks into lunco-api, the
# same string-keyed pattern lunco-mobility uses for its physics queries.
# `default-features = false`: we use only the query/registry/schema types, never
# lunco-api's native HTTP server (`transport-http` â†’ axum/tokio, wasm-incompatible)
# or screenshot stack (`render`). Every other lunco-api consumer does the same.
lunco-api = { path = "../lunco-api", default-features = false }
# Reuse the existing height-surface machinery instead of duplicating it: the DEM
# loader fills `field::HeightGrid` (bilinear `height_at`, `to_mesh_data`,
# `to_avian_heights` â†’ `Collider::heightfield`) â€” the same grid the procedural
# obstacle field already drives. No new grid/mesh/collider code.
lunco-obstacle-field = { path = "../lunco-obstacle-field" }
# The pure (bevy/avian-free) DEM bake pipeline: decode GeoTIFF â†’ crop/resample â†’
# stamp craters â†’ `HeightGrid`. Shared VERBATIM by the native async build task and
# the wasm Web Worker (`dem_worker`), so the off-thread web bake runs identical
# code. Also owns the main-thread worker client (`worker_client`, wasm-only).
lunco-terrain-bake = { path = "../lunco-terrain-bake" }
# The one general self-describing material â€” LOD tiles use the `terrain_geomorph`
# shader (CDLOD vertex morph) through `ShaderMaterial`, not a bespoke material type.
lunco-materials = { path = "../lunco-materials" }
lunco-settings = { path = "../lunco-settings" }
# M3 spawn: avian heightfield collider + big_space anchoring + cross-platform
# byte I/O for the DEM asset (FileStorage native / WebStorage web).
avian3d = { workspace = true }
big_space = { workspace = true }
lunco-storage = { path = "../lunco-storage" }
# Transport pause lever: freeze the sim (via `TimeTransport`) while a DEM terrain
# is still building so physics bodies don't fall through the not-yet-ready collider
# (critical on web, where the DEM byte-fetch + decode takes seconds). Same freeze
# mechanism the obstacle-field regen uses. See `collider_ring::hold_physics_until_dem_ready`.
lunco-time = { path = "../lunco-time" }
# Shared content-addressed cache dir (`cache://`) for the derived-layer bake
# (P4): persist surface/normal maps keyed by DEM+param hash so the AO march
# isn't redone every load and peers converge. `cache_dir()` is cross-platform.
lunco-assets = { path = "../lunco-assets" }
# The content-addressed precompute disk cache (Substrate B). The derived-layer
# bake (`DerivedBake`) is a `lunco_precompute::Bake`; the crate owns the
# load/store/rebake orchestration + the FNV-1a key fold (re-exported `Fnv1a`).
lunco-precompute = { path = "../lunco-precompute" }
serde = { workspace = true }
# `ApiQueryProvider` speaks `serde_json::Value` for params/response.
serde_json = { workspace = true }

[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = { workspace = true }

[lints]
workspace = true

