[package]
name = "lunco-usd-bevy"
version = "0.1.0"
edition = "2021"

[dependencies]
# RENDER-FREE by construction (docs/architecture/render-decoupling.md): NO
# `bevy_pbr` / `bevy_core_pipeline` / `bevy_post_process` / `bevy_anti_alias` /
# `tonemapping_luts` — each of those pulls `bevy_render` → wgpu + naga into the
# `--no-ui` server and the wasm worker. This crate states appearance and camera
# INTENT (`lunco_render::{PbrLook, SceneCamera}`); `lunco-render-bevy` binds it.
# `cargo tree -p lunco-usd-bevy -i wgpu` must report "package ID not found".
#
# `zstd_rust`: `bevy_image` refuses to build without a zstd backend chosen; the
# pure-Rust (ruzstd) one keeps `cargo test -p lunco-usd-bevy` standalone and
# wasm-compatible.
#
# `hdr` / `ktx2`: the two image codecs a `UsdLuxDomeLight` needs (see `dome.rs`).
# `hdr` is the Radiance `.hdr` equirect every HDRI library ships; `ktx2` reads a
# pre-baked cubemap. Both are `bevy_image` codec features (`hdr = image/hdr`,
# `ktx2 = dep:ktx2`) — NEITHER pulls `bevy_render`, so the render-free contract
# above still holds. The IBL components themselves (`Skybox`,
# `GeneratedEnvironmentMapLight`) live in `bevy_light`, already enabled.
bevy = { workspace = true, features = ["bevy_gltf", "bevy_world_serialization", "bevy_mesh", "bevy_light", "mesh_picking", "zstd_rust", "hdr", "ktx2"] }
# `Mesh`, `Mesh3d`, `Indices`, `PrimitiveTopology` — render-FREE (depends only on
# `wgpu-types`). Named directly so mesh building never reaches for
# `bevy::render::render_resource`, which is a `bevy_render` (wgpu + naga)
# re-export. See docs/architecture/render-decoupling.md.
bevy_mesh = { workspace = true }
# `Extent3d`/`TextureDimension`/`TextureFormat` for the CPU-rasterised diagnostic
# label `Image`. These are the POD descriptors `bevy_image` itself takes from
# `wgpu-types`; reaching for them via `bevy::render::render_resource` would pull
# in wgpu + naga. `wgpu-types` is NOT `wgpu`.
wgpu-types = "29"
# `f16` for the `Rgba16Float` dome cubemap (`dome.rs`). Rgba16Float is the
# widest float format wgpu guarantees is *filterable* — Rgba32Float is not, and
# a skybox/IBL cubemap must be linearly sampled. Same crate bevy_image itself
# uses to build its gradient cubemaps.
half = "2"
# NURBS evaluation for `UsdGeomNurbsCurves` / `NurbsPatch`. Chosen over writing
# one: it covers curves AND surfaces from one numeric core (a hand-written pair
# would be two evaluators that can disagree), plus `RevolvedCurve` — which is
# 80.4% of HAB-1's vertices, the dome included — and exact `Circle`/`Torus`
# specifieds for the seals and chain links.
#
# `truck-geometry` ONLY, not the wider truck stack: this is 4 direct deps
# (serde, thiserror, truck-base, truck-geotrait) ~ 8 transitively, cgmath-based
# so it does NOT touch the workspace's `nalgebra` (that conflict is `curvo`'s,
# not truck's), and its `truck-geotrait` already declares
# `getrandom 0.2 + features = ["js"]` for wasm32 — the exact pin this workspace
# uses. `truck-meshalgo` is deliberately absent: it pulls rayon + vtkio and we
# tessellate ourselves (`curve_sweep.rs` owns the sweep, which truck has no
# equivalent for — no crate implements rotation-minimizing frames).
truck-geometry = "0.5.0"
openusd = { workspace = true }
lunco-core = { path = "../lunco-core" }
# `FlightSoftware` = the unified control-surface tag stamped on any
# `lunco:vessel="true"` prim, making it possessable/controllable by topology
# (replaces the removed `Vessel` marker).
lunco-fsw = { path = "../lunco-fsw" }
lunco-time = { path = "../lunco-time" }
lunco-render = { path = "../lunco-render" }
big_space = { workspace = true }
anyhow = { workspace = true }
# CPU glyph rasterisation for the failed-asset diagnostic label: the
# filename is baked once into an `Image` (no second camera, no per-frame
# projection) and used as a material texture. `ab_glyph` is already in the
# tree via bevy_text. Font bytes come from `lunco-assets` (which owns the
# native-read / web-fetch procedure).
ab_glyph = "0.2"
lunco-assets = { workspace = true }

[dev-dependencies]
tempfile = { workspace = true }


[lints]
workspace = true
