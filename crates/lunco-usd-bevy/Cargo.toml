[package]
name = "lunco-usd-bevy"
version = "0.1.0"
edition = "2021"

[dependencies]
bevy = { workspace = true, features = ["bevy_pbr", "bevy_gltf", "bevy_scene", "bevy_mesh", "bevy_light", "bevy_post_process", "bevy_anti_alias", "mesh_picking"] }
openusd = { workspace = true }
lunco-usd-composer = { path = "../lunco-usd-composer" }
big_space = { workspace = true }
serde = { version = "1.0", features = ["derive"] }
thiserror = "2.0"
tracing = "0.1"
anyhow = "1.0"
futures-lite = "2.3"

