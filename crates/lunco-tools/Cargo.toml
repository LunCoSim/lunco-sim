[package]
name = "lunco-tools"
version = "0.1.0"
edition = "2021"

# Runtime-agnostic tool registry: a tool is a named bundle of callable functions
# with metadata, independent of HOW it is implemented (rhai, native Rust, future
# Python/…). Deliberately dependency-free (no rhai, no bevy) so any crate can
# describe / register / discover tools; runtime BINDING lives in adapter crates
# (e.g. lunco-tools-rhai). wasm-clean.

