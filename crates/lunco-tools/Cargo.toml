[package]
name = "lunco-tools"
version = "0.1.0"
edition = "2021"
license.workspace = true

# Runtime-agnostic tool registry: a tool is a named bundle of callable functions
# with metadata, independent of HOW it is implemented (rhai, native Rust, future
# Python/…). Deliberately dependency-free (no rhai, no bevy) so the rhai-binding
# adapter (`lunco-tools-rhai`) stays slim — bevy-aware execution (the behaviour
# tree's `run_tool` action path) lives in `lunco-tools-bevy`, not here. wasm-clean.

