[package]
name = "lunco-usd-sim"
version = "0.1.0"
edition = "2021"

[dependencies]
# RENDER-FREE by construction (docs/architecture/render-decoupling.md): NO
# `bevy_pbr` / `bevy_core_pipeline` / `bevy_post_process` / `bevy_anti_alias`.
# This crate states appearance + camera INTENT (`lunco_render::{PbrLook,
# SceneCamera}`, `lunco_materials::ShaderLook`); `lunco-render-bevy` binds it.
bevy = { workspace = true, features = ["bevy_gltf", "bevy_world_serialization", "bevy_mesh", "bevy_light", "mesh_picking"] }
openusd = { workspace = true }
lunco-usd-bevy = { path = "../lunco-usd-bevy" }
lunco-usd-avian = { path = "../lunco-usd-avian" }
# `ShaderLook` + `ParamValue` (the open, WGSL-reflected parameter set).
# `lunco-materials` is render-free: `shader_material.rs` (the `AsBindGroup` that
# pulled `bevy_pbr`) moved to `lunco-render-bevy` on 2026-07-13, so this crate's
# dep GRAPH no longer reaches wgpu either. Keep it that way.
lunco-materials = { path = "../lunco-materials" }
lunco-render = { path = "../lunco-render" }
lunco-settings = { path = "../lunco-settings" }
lunco-mobility = { path = "../lunco-mobility" }
lunco-core = { path = "../lunco-core" }
lunco-celestial = { path = "../lunco-celestial", default-features = false }
lunco-time = { path = "../lunco-time" }
lunco-environment = { path = "../lunco-environment" }
lunco-fsw = { path = "../lunco-fsw" }
lunco-hardware = { path = "../lunco-hardware" }
# Only the camera components (FreeFlightCamera/OrbitCamera/…) — egui-free.
# `default-features = false` keeps avatar's egui UI (+ workbench shell) out of a
# headless server build.
lunco-avatar = { path = "../lunco-avatar", default-features = false }
lunco-controller = { path = "../lunco-controller" }
# USD → autopilot bridge: a `LuncoProgram` prim whose `lunco:program:sourceAsset` is a
# BT.CPP XML tree, and the waypoint prims its leaves reference. This crate owns
# prim-path → entity resolution;
# lunco-autopilot stays USD-free and just compiles what it is handed.
lunco-autopilot = { path = "../lunco-autopilot" }
lunco-cosim = { path = "../lunco-cosim" }
lunco-modelica = { path = "../lunco-modelica", default-features = false }
rumoca-phase-parse = { workspace = true }
lunco-scripting = { path = "../lunco-scripting" }
lunco-doc = { path = "../lunco-doc" }
lunco-api = { path = "../lunco-api", default-features = false }
lunco-assets = { workspace = true }
avian3d = { workspace = true }
big_space = { workspace = true }
leafwing-input-manager = { workspace = true }
serde_json = { workspace = true }

[features]
python = ["lunco-scripting/python"]

[lints]
workspace = true
