[package]
name = "lunco-theme"
version = "0.1.0"
edition = "2021"
description = "Core design tokens and theming system for LunCoSim"

[dependencies]
bevy = { workspace = true }
bevy_egui = { workspace = true }
catppuccin-egui = { workspace = true }
lunco-assets = { workspace = true }
serde = { workspace = true }

# Wasm-only: fetch DejaVu Sans TTF over HTTP at runtime (the font is
# served at `/fonts/DejaVuSans.ttf` by the page bundle — see the copy
# step in `scripts/build_web.sh`). Native loads from the workspace
# cache via `std::fs` instead.
[target.'cfg(target_arch = "wasm32")'.dependencies]
wasm-bindgen = { workspace = true }
wasm-bindgen-futures = { workspace = true }
js-sys = { workspace = true }
web-sys = { workspace = true, features = ["Window", "Response"] }

[lints]
workspace = true
