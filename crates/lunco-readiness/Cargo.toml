[package]
name = "lunco-readiness"
version = "0.1.0-dev"
edition = "2021"
license.workspace = true
description = "Readiness registry: what the world is still waiting on, and — by authored policy — whether that waiting freezes the world, one object, or nothing"

[dependencies]
# Substrate only. Deliberately NO avian and NO domain crates: this crate answers
# "what is still pending and what should that hold?", and knows nothing about how
# a hold is enforced. The physics effector lives in `lunco-physics`, so producers
# (Modelica, scripting, scene load) can report readiness without pulling physics.
bevy = { workspace = true }
lunco-hooks = { path = "../lunco-hooks" }

[lints]
workspace = true
