[workspace]
members = [
    "crates/lunco-core",
    "crates/lunco-obc",
    "crates/lunco-fsw",
    "crates/lunco-controller",
    "crates/lunco-attributes",
    "crates/lunco-avatar",
    "crates/lunco-client",
    "crates/lunco-telemetry",
    "crates/lunco-celestial",
    "crates/lunco-hardware",
    "crates/lunco-mobility",
    "crates/lunco-robotics",
    "crates/lunco-modelica",
    "crates/lunco-usd-avian",
    "crates/lunco-usd-bevy",
    "crates/lunco-usd-composer",
    "crates/lunco-usd-sim",
    "crates/lunco-usd",
    "crates/lunco-sandbox-edit",
    "crates/lunco-ui",
    "crates/lunco-assets",
    "crates/lunco-networking",
    "crates/lunco-command-macro",
    "crates/lunco-terrain",
    "crates/lunco-api",
    "crates/lunco-cosim",
    "crates/lunco-environment",
    "crates/lunco-doc",
    "crates/lunco-doc-bevy",
    "crates/lunco-twin",
    "crates/lunco-workbench",
    "crates/lunco-scripting",
    "crates/lunco-viz",
    "crates/lunco-canvas",
    "crates/lunco-cache",
    "crates/lunco-theme",
    "crates/lunco-storage",
    "crates/lunco-workspace"
]
resolver = "2"

[patch.crates-io]
# Force ALL scnr2 related crates to 0.3.3
scnr2 = { git = "https://github.com/jsinger67/scnr2", tag = "0.3.3" }
scnr2_generate = { git = "https://github.com/jsinger67/scnr2", tag = "0.3.3" }
scnr2_macro = { git = "https://github.com/jsinger67/scnr2", tag = "0.3.3" }

# Local rumoca worktree — lets us diagnose + fix rumoca bugs (e.g.
# `MissingStateEquation("spring.w_rel")` on every Mechanics.Rotational
# example) without pushing to the LunCoSim/rumoca fork first. Remove
# or revert to git-main once the fix lands upstream.
[patch."https://github.com/LunCoSim/rumoca"]
rumoca-session   = { path = "../rumoca/crates/rumoca-session" }
rumoca-sim       = { path = "../rumoca/crates/rumoca-sim" }
rumoca-phase-parse = { path = "../rumoca/crates/rumoca-phase-parse" }
rumoca-tool-fmt  = { path = "../rumoca/crates/rumoca-tool-fmt" }
rumoca-tool-lint = { path = "../rumoca/crates/rumoca-tool-lint" }

[workspace.package]
description = "Initialize multi-crate workspace architecture for vessel control simulation"

[workspace.dependencies]
bevy = { version = "0.18.1", features = ["default"] }
lunco-assets = { path = "crates/lunco-assets" }
avian3d = { version = "0.6.1", default-features = false, features = ["3d", "f64", "parry-f64", "parallel", "debug-plugin", "default-collider", "collider-from-mesh"] }
big_space = "0.12.0"
leafwing-input-manager = "0.20.0"
bevy_egui = { version = "0.39.1", features = ["serde"] }
bevy-inspector-egui = "0.36.0"
transform-gizmo-bevy = "0.9.0"
avian_pickup = "0.5.0-rc.1"
chrono = "0.4.40"
futures-lite = "2.3.0"
resvg = "0.45"
tiny-skia = "0.11"
usvg = { version = "0.45", default-features = false }
image = { version = "0.25", features = ["tiff", "png", "jpeg"] }
smallvec = "1.13"
openusd = "0.2.0"
instant = "0.1"
# getrandom 0.2 with js feature for wasm32 support (needed by rand, uuid, etc.)
getrandom_02 = { package = "getrandom", version = "0.2", features = ["js"] }
lunco-api = { path = "crates/lunco-api" }
lunco-terrain = { path = "crates/lunco-terrain" }
lunco-cosim = { path = "crates/lunco-cosim" }
lunco-environment = { path = "crates/lunco-environment" }
lunco-theme = { path = "crates/lunco-theme" }

egui_colors = "0.4.0"
catppuccin-egui = "5.2.0"
egui-phosphor = "0.7.1"
