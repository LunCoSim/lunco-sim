[workspace]
members = [
    "crates/lunco-sim-core",
    "crates/lunco-sim-physics",
    "crates/lunco-sim-obc",
    "crates/lunco-sim-fsw",
    "crates/lunco-sim-controller",
    "crates/lunco-sim-attributes",
    "crates/lunco-sim-avatar",
    "crates/lunco-sim-client",
    "crates/lunco-sim-rover-raycast"
, "crates/lunco-sim-celestial"]
resolver = "2"

[workspace.package]
description = "Initialize multi-crate workspace architecture for vessel control simulation"

[workspace.dependencies]
bevy = { version = "0.18.1", features = ["default"] }
avian3d = { version = "0.6.1", default-features = false, features = ["3d", "f64", "parry-f64", "parallel", "debug-plugin", "default-collider"] }
big_space = "0.12.0"
leafwing-input-manager = "0.20.0"
bevy_egui = "0.39.1"
bevy-inspector-egui = "0.36.0"
