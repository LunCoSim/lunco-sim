# ============================================================================
# LunCoSim — nightly desktop builds (manual trigger)
# ============================================================================
# Builds lunica and sandbox as native desktop binaries for
# Linux (x86_64), macOS (arm64 + x86_64 cross-compiled on Apple Silicon),
# and Windows (x86_64), packages each with assets + docs + skills + cache,
# and uploads the archives as GitHub Actions artifacts. A GitHub Release is
# created when `make_release` is true (default).
#
# Trigger: workflow_dispatch ONLY (manual, from the Actions tab).
#   https://github.com/LunCoSim/luncosim-workspace/actions/workflows/nightly.yml
#
# Each OS job downloads the cache assets its binaries need, builds both
# binaries, and packages them via scripts/build_native.sh. Compilation is
# shared across the two binaries (same cargo workspace, shared deps).
# ============================================================================

name: Nightly Builds

on:
  workflow_dispatch:
    inputs:
      make_release:
        description: 'Create a GitHub release with the artifacts'
        type: boolean
        default: true
      release_tag:
        description: 'Release tag (default: nightly-YYYY-MM-DD). Use a custom tag like "nightly-2026-07-08-test" to avoid overwriting.'
        type: string
        required: false

env:
  CARGO_TERM_COLOR: always

permissions:
  contents: write   # needed for gh-release upload

jobs:
  # ── Determine the date tag once ──────────────────────────────────────────
  # Uses a fixed `nightly` tag so each run OVERWRITES the previous release
  # (rolling). The date is kept for the release title + body so users can
  # see when the build was made. Override the tag with the `release_tag`
  # input to pin a specific build (e.g. `nightly-2026-07-08-test`).
  meta:
    runs-on: ubuntu-latest
    outputs:
      date: ${{ steps.date.outputs.date }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - id: date
        run: echo "date=$(date -u +'%Y-%m-%d %H:%M UTC')" >> "$GITHUB_OUTPUT"
      - id: tag
        run: |
          if [ -n "${{ inputs.release_tag }}" ]; then
            echo "tag=${{ inputs.release_tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=nightly" >> "$GITHUB_OUTPUT"
          fi

  # ── Build both binaries per OS ───────────────────────────────────────────
  build:
    needs: meta
    name: ${{ matrix.label }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - label: Linux x86_64
            os: ubuntu-22.04
            platform: linux
            arch: x86_64
            # Bevy's Linux windowing stack (winit/wayland/x11) needs these
            # dev headers at build time. alsa = libasound2 (bevy_audio is
            # off, but alsa-sys may still be a transitive); udev = libudev
            # (winit); wayland + xkbcommon + x11 = the display backends.
            apt_pkgs: >-
              libasound2-dev libudev-dev
              libwayland-dev libxkbcommon-dev
              libx11-dev xorg-dev
            cross_target: ''    # no cross-compile on Linux

          - label: macOS ARM64
            os: macos-15
            platform: macos
            arch: aarch64
            apt_pkgs: ''
            # Cross-compile x86_64 on the SAME Apple Silicon runner (avoids
            # the chronically-unavailable macos-13 Intel runner). Adds the
            # x86_64-apple-darwin rustup target, then runs build_native.sh
            # twice more with --target. The cross builds use a separate
            # target/<triple>/ subdir so they don't overwrite the native ones.
            cross_target: x86_64-apple-darwin

          - label: Windows x86_64
            os: windows-latest
            platform: windows
            arch: x86_64
            apt_pkgs: ''
            cross_target: ''    # no cross-compile on Windows

    runs-on: ${{ matrix.os }}
    # Force bash on all platforms — our build scripts are bash. On Windows
    # GitHub runners, `shell: bash` uses Git Bash (pre-installed).
    defaults:
      run:
        shell: bash
    env:
      # Point the asset pipeline at a project-local .cache/ so the build
      # script can find the downloaded fonts / MSL / models. Without this,
      # cache_dir() falls back to an OS-specific path that varies per
      # runner. Using $PWD/.cache keeps everything in the workspace.
      LUNCOSIM_CACHE: ${{ github.workspace }}/.cache

    steps:
      - uses: actions/checkout@v4

      # rust-toolchain.toml pins nightly-2026-02-27; the dtolnay action
      # honours it but we set the toolchain explicitly to be safe on
      # fresh runners where the file hasn't been read yet.
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly-2026-02-27
          components: rust-src

      - name: Install Linux system dependencies
        if: matrix.platform == 'linux' && matrix.apt_pkgs != ''
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq ${{ matrix.apt_pkgs }}

      # Node.js is needed by `cargo run -p lunco-assets -- process -p
      # lunco-usd` (calls `npx @gltf-transform/cli` to strip Draco/WebP
      # extensions from the rover glTF). Pre-installed on GitHub runners,
      # but we set it up explicitly to guarantee a known version.
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 'latest'

      # Cache the cargo registry + git checkouts. The target/ dir is
      # cached separately by swatinem/rust-cache which keys on
      # Cargo.lock + OS + rust-toolchain. sccache was removed — its
      # GitHub Actions cache backend (SCCACHE_GHA_ENABLED) is flaky
      # (Azure 400 outages kill the build at the first rustc invocation).
      # swatinem/rust-cache on target/ is the bigger, reliable win.
      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ matrix.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ matrix.os }}-cargo-registry-

      - name: Cache target directory
        uses: swatinem/rust-cache@v2
        with:
          key: ${{ matrix.platform }}-${{ matrix.arch }}

      # ── Build + package each binary (native arch) ───────────────────────
      # The two builds share compiled deps (incremental cargo), so the
      # 2nd is much faster than the 1st. --package creates a
      # .tar.gz (unix) or .zip (windows) archive in dist/.
      # docs/ + AGENTS.md are bundled by build_native.sh (not --no-assets).
      # Cache download runs automatically before staging (unless
      # --skip-download), so the .cache/ subdirs are populated in-place.
      - name: Build lunica (desktop)
        run: ./scripts/build_native.sh lunica --release --package

      - name: Build sandbox (desktop)
        run: ./scripts/build_native.sh sandbox --release --package

      # ── Cross-compile (macOS x86_64 on Apple Silicon) ───────────────────
      # Only runs when the matrix entry sets `cross_target`. Adds the
      # rustup target, then runs build_native.sh again with --target so the
      # x86_64 binary lands in dist/<binary>-macos-x86_64/. The cross
      # build recompiles all deps for the new target (separate
      # target/<triple>/ dir), so it's ~as long as the native build —
      # but avoids the unavailable macos-13 runner entirely.
      - name: Add cross-compile target
        if: matrix.cross_target != ''
        run: rustup target add ${{ matrix.cross_target }}

      - name: Build lunica (cross ${{ matrix.cross_target }})
        if: matrix.cross_target != ''
        run: ./scripts/build_native.sh lunica --release --package --target ${{ matrix.cross_target }} --skip-download

      - name: Build sandbox (cross ${{ matrix.cross_target }})
        if: matrix.cross_target != ''
        run: ./scripts/build_native.sh sandbox --release --package --target ${{ matrix.cross_target }} --skip-download

      # ── Upload artifacts (native arch) ──────────────────────────────────
      - name: Upload lunica artifact
        uses: actions/upload-artifact@v4
        with:
          name: lunica-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/lunica-${{ matrix.platform }}-${{ matrix.arch }}.*
          if-no-files-found: warn
          retention-days: 30

      - name: Upload sandbox artifact
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-${{ matrix.platform }}-${{ matrix.arch }}
          path: dist/sandbox-${{ matrix.platform }}-${{ matrix.arch }}.*
          if-no-files-found: warn
          retention-days: 30

      # ── Upload artifacts (cross-compile arch, macOS x86_64) ────────────
      # `platform_short` in build_native.sh maps *darwin* → "macos", so the
      # cross-compiled dist dir is dist/<bin>-macos-x86_64/ regardless of
      # which arch ran the build.
      - name: Upload lunica (cross) artifact
        if: matrix.cross_target != ''
        uses: actions/upload-artifact@v4
        with:
          name: lunica-macos-x86_64
          path: dist/lunica-macos-x86_64.*
          if-no-files-found: warn
          retention-days: 30

      - name: Upload sandbox (cross) artifact
        if: matrix.cross_target != ''
        uses: actions/upload-artifact@v4
        with:
          name: sandbox-macos-x86_64
          path: dist/sandbox-macos-x86_64.*
          if-no-files-found: warn
          retention-days: 30

  # ── Optional: create a GitHub Release with all artifacts ────────────────
  release:
    needs: [meta, build]
    runs-on: ubuntu-latest
    # Only create a release if the user opted in (default true for
    if: github.event_name == 'workflow_dispatch' && inputs.make_release
    steps:
      - uses: actions/checkout@v4

      - name: Update git tag
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git tag -f ${{ needs.meta.outputs.tag }}
          git push -f origin ${{ needs.meta.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      # Flatten the artifact directory structure: artifacts/<name>/<file>
      # → artifacts/<file> so the release can list them simply.
      - name: Flatten artifacts
        run: |
          find artifacts -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec mv {} artifacts/ \;
          # Remove the now-empty subdirectories
          find artifacts -mindepth 1 -type d -empty -delete || true
          echo "## Artifact listing" >> "$GITHUB_STEP_SUMMARY"
          ls -lh artifacts/ | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Create nightly release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.tag }}
          name: Nightly ${{ needs.meta.outputs.date }}
          body: |
            ## LunCo Nightly Build — ${{ needs.meta.outputs.date }}

            Welcome to the nightly development snapshot of **LunCo** — the open-source, high-fidelity co-simulation platform for space mission design and system engineering.

            > 🛠️ **Status: Active Development**
            > LunCoSim is in active pre-alpha development. These nightly builds represent our latest progress and are automatically updated. Expect frequent changes, experimental features, and occasional bugs as we work toward stable releases.

            ---

            ### 🚀 Featured Applications

            #### 1. **Sandbox: Physics & Environment Sandbox**
            The **Sandbox** is an interactive, real-time 3D simulation environment built to validate planetary rover dynamics, suspension behavior, and physical interactions.
            *   **Drive the Perseverance Rover:** Take control of the built-in rover model and test ground mobility across customized planetary terrains.
            *   **High-Precision Space Physics:** Powered by Avian3D and double-precision (`f64`) spatial math to ensure robust physics simulations from millimeter-scale joints to solar-system scales.
            *   **OpenUSD Scene Integration:** Load, compose, and inspect 3D scenes dynamically using the industry-standard Universal Scene Description format.
            *   **Collaborative Design:** Networked multiplayer support (via WebTransport) allows multiple users to join, edit, and run simulations in the same environment.

            #### 2. **Lunica: Modelica Engineering Workbench**
            **Lunica** is a stripped-down version of the sandbox focusing exclusively on Modelica features (multi-domain behavioral simulation like thermal control, power grids, life support, mechanics). It removes the 3D physics engine and rover viewport to provide a lightweight, dedicated system design workspace.
            *   **Visual Schematic Editor:** Drag, drop, and connect component blocks to design complex subsystems.
            *   **Integrated Solver:** Compile models into differential-algebraic equations (DAEs) using the `rumoca` compiler and run advanced solvers to generate telemetry.
            *   **Real-time Plotting:** View telemetry graphs and analyze system states instantly.
            *   **Pre-packaged Libraries:** Includes a copy of the Modelica Standard Library (MSL) in the cache for offline modeling.

            ---

            ### 📦 Downloads & Platform Support

            Select the archive matching your operating system. Each bundle contains the pre-compiled native application and all necessary assets.

            | Application | Linux (x86_64) | macOS (Apple Silicon) | macOS (Intel) | Windows (x86_64) |
            | :--- | :---: | :---: | :---: | :---: |
            | **Sandbox** | ✅ `.tar.gz` | ✅ `.tar.gz` | ✅ `.tar.gz` | ✅ `.zip` |
            | **Lunica** | ✅ `.tar.gz` | ✅ `.tar.gz` | ✅ `.tar.gz` | ✅ `.zip` |

            ---

            ### 🛠️ How to Run & Security Instructions

            #### 🔒 Bypassing Unsigned Binary Warnings
            Because these are automated development builds, the binaries are not code-signed. Follow these steps to bypass the operating system warning:

            *   **Windows (SmartScreen):**
                1. Double-click `run.bat` or the executable.
                2. On the blue *"Windows protected your PC"* popup, click **"More info"**.
                3. Click **"Run anyway"**.
            *   **macOS (Gatekeeper):**
                *   *Method A (Recommended):* Open Terminal in the extracted folder, run `xattr -cr .` to clear quarantine flags, and run `./run.sh`.
                *   *Method B:* Control-click (or right-click) `run.sh` or the application, select **Open**, and click **Open** in the confirmation dialog.

            #### 🏎️ Quick Start Commands

            **Linux / macOS:**
            ```bash
            # Extract the archive
            tar -xzf <archive-name>.tar.gz
            cd <folder-name>
            # Launch the application
            ./run.sh
            ```

            **Windows:**
            1. Extract the `.zip` archive (Right-click → *Extract All*).
            2. Double-click `run.bat` to launch.

            ---

            ### 💬 Feedback & Community
            *   **Join our Discord:** Chat with space engineers and creators on [Discord](https://discord.gg/A6U3GdvQum).
            *   **Report Issues:** Found a bug? Open a ticket on [GitHub Issues](${{ github.server_url }}/${{ github.repository }}/issues).
          files: artifacts/*
          # Mark as the latest release so it shows on the repo main page
          # (right sidebar "Releases" widget). When a stable release is
          # published later, that one should be marked latest instead.
          prerelease: false
          make_latest: true
          generate_release_notes: false
