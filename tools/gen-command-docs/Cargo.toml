[package]
name = "gen-command-docs"
version = "0.0.0"
edition = "2021"
publish = false
description = "Auto-generate docs/commands-reference.md from #[Command] structs in source."

[dependencies]
syn = { version = "2", features = ["full", "extra-traits", "visit"] }
quote = "1"

# Standalone package: the empty [workspace] table excludes this from the main
# Cargo workspace, so it has its own target dir and never touches the app build
# graph. Run with:
#   cargo run --manifest-path tools/gen-command-docs/Cargo.toml
[workspace]
